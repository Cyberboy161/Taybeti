<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taybeti – Passphrase Cards</title>
<style>
@page{size:A4 portrait;margin:3mm}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#1a1a1a;padding-top:90px;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#eee}

/* ── Top Bar ── */
.bar{position:fixed;top:0;left:0;right:0;background:#0d0d0d;padding:8px 12px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;z-index:200;font-size:13px;border-bottom:1px solid #333}
.bar label{color:#aaa;font-size:12px}
.bar select,.bar input[type=file],.bar input[type=text]{background:#222;color:#eee;border:1px solid #444;padding:5px 8px;border-radius:5px;font-size:12px}
.bar .g{display:flex;align-items:center;gap:4px;background:#181818;padding:3px 8px;border-radius:6px}
.pg{display:inline-grid;grid-template-columns:1fr 1fr 1fr;gap:1px;vertical-align:middle}
.pg button{background:#222;color:#999;border:1px solid #444;border-radius:3px;padding:3px 6px;font-size:11px;cursor:pointer}
.pg button.sel{background:#4f9cf7;border-color:#4f9cf7;color:#fff}
.prBtn{background:#4f9cf7;color:#fff;border:none;padding:7px 16px;border-radius:5px;cursor:pointer;font-weight:600;font-size:13px}
.bar a{color:#666;text-decoration:none;font-size:12px}

/* ── Screen Preview ── */
.preview{max-width:460px;margin:0 auto;padding:0 12px}
.preview h2{font-size:15px;color:#fff;background:#4f9cf7;padding:5px 14px;border-radius:6px;display:inline-block;margin:6px auto 10px;text-align:center}
.preview .card{border:1px solid #555;background:#fff;display:flex;flex-direction:column;overflow:hidden;max-width:100%;color:#111;margin:0 auto;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.preview .card.vert{flex-direction:row}
.preview .card.vert .h{border-right:1px dashed #000;flex:1}
.preview .h{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3mm 4mm;position:relative;min-height:80px}
.preview .h+.h{border-top:1.5px dashed #000}
.preview .front .w{width:100%;font-size:8px;color:#333;text-align:center;line-height:1.4;margin-bottom:2px}
.preview .front .l{width:80%;border-bottom:1px solid #444;min-height:8mm}
.preview .back .h{background:#111;color:#fff;min-height:80px}
.preview .back .im{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.preview .back .ox{position:absolute;inset:0;z-index:1;background:rgba(0,0,0,0.35)}
.preview .back .cx{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:2mm;padding:2mm;width:100%}
.preview .back .qr{background:#fff;border-radius:1mm;padding:1.2mm;box-shadow:0 0 2mm rgba(0,0,0,.5);display:flex}
.preview .back .qr img{display:block;width:80px;height:80px}
.preview .back .inf{position:absolute;bottom:1mm;left:2mm;right:2mm;z-index:3;font-size:7px;color:#fff;text-align:center;text-shadow:0 0 3px #000;line-height:1.3}
.preview .back .url{position:absolute;top:1mm;left:2mm;right:2mm;z-index:3;font-size:6px;color:#fffd;text-align:center;text-shadow:0 0 3px #000;word-break:break-all}

/* ── Print Grid ── */
.print-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:2mm;width:100%;max-width:204mm;margin:0 auto}
.print-grid .card{position:relative;border:1px solid #999;display:flex;flex-direction:column;background:#fff;overflow:hidden}
.print-grid .card.vert{flex-direction:row}.print-grid .card.vert .h{border-right:1px dashed #000;flex:1}
.print-grid .h{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1mm 2mm;position:relative;min-height:0}
.print-grid .h+.h{border-top:1.5px dashed #000}
.print-grid .front .w{width:100%;font-size:6px;color:#333;text-align:center;line-height:1.25;margin-bottom:1px}
.print-grid .front .l{width:75%;border-bottom:1px solid #444;min-height:5mm}
.print-grid .back .h{background:#111}
.print-grid .back .im{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.print-grid .back .ox{position:absolute;inset:0;z-index:1;background:rgba(0,0,0,0.35)}
.print-grid .back .cx{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:1mm;padding:1mm;width:100%}
.print-grid .back .qr{background:#fff;border-radius:0.8mm;padding:0.8mm;box-shadow:0 0 1.5mm rgba(0,0,0,.5);display:flex;width:12mm;height:12mm}
.print-grid .back .qr img{display:block;width:100%;height:100%}
.print-grid .back .inf{position:absolute;bottom:0.5mm;left:1mm;right:1mm;z-index:3;font-size:3.5px;color:#fff;text-align:center;text-shadow:0 0 2px #000;line-height:1.2}
.print-grid .back .url{position:absolute;top:0.5mm;left:1mm;right:1mm;z-index:3;font-size:2.8px;color:#fffd;text-align:center;text-shadow:0 0 2px #000;word-break:break-all}

@media print{
 .bar{display:none}
 .preview{display:none}
 .print-grid{display:grid;height:auto;min-height:0;width:100%}
 .page-break{page-break-after:always;margin:0;border:none;height:0}
 body{background:#fff;padding:0;margin:0}
 @page{size:A4 portrait;margin:3mm}
}
@media screen{
 .print-grid{display:none}
 .page-break{display:none}
}
</style>
</head>
<body>
<div class="bar">
    <div class="g"><label>Layout</label><select id="lo" onchange="buildCards()">
        <option value="2h">2 strips</option><option value="1">1 (no cut)</option><option value="2v">2 vertical</option>
    </select></div>
    <div class="g"><label>Design</label><select id="bg" onchange="buildCards()">
        <option value="cyber">Cybersecurity</option><option value="matrix">Matrix</option><option value="red">Red</option>
        <option value="blue">Blue</option><option value="circuit">Circuit</option><option value="fire">Fire</option>
        <option value="ice">Ice</option><option value="neon">Neon</option><option value="dark">Dark</option><option value="gold">Gold</option>
    </select></div>
    <div class="g"><label>Image</label><input type="file" accept="image/*" onchange="up(this)"></div>
    <div class="g"><label>QR→</label><select id="qd" onchange="buildCards()">
        <option value="home">Homepage</option><option value="invited">Invited</option>
    </select></div>
    <div class="g"><label>QR pos</label><div class="pg" id="pg">
        <button data-p="tl">↖</button><button data-p="tc">↑</button><button data-p="tr">↗</button>
        <button data-p="ml">←</button><button data-p="mc" class="sel">●</button><button data-p="mr">→</button>
        <button data-p="bl">↙</button><button data-p="bc">↓</button><button data-p="br">↘</button>
    </div></div>
    <div class="g"><input id="ph" placeholder="Phone" oninput="buildCards()" style="width:80px">
    <input id="em" placeholder="Email" oninput="buildCards()" style="width:80px"></div>
    <div class="g"><input id="customUrl" placeholder="Custom QR (e.g. Instagram)" oninput="buildCards()" style="width:130px" title="Enter any URL to show as a second QR code"></div>
    <button class="prBtn" onclick="window.print()">🖨️ Print</button>
    <a href="index.html">🏠</a>
</div>

<div class="preview">
<h2>📝 Front Preview</h2>
<div id="previewFront"></div>
<hr style="border:1px dashed #444;margin:12px 0">
<h2>🖼️ Back Preview</h2>
<div id="previewBack"></div>
</div>

<hr style="border:none;margin:0;page-break-after:always">

<h2 style="display:none">📝 Front</h2>
<div class="print-grid" id="pf"></div>
<div class="page-break"></div>
<div class="print-grid" id="pb"></div>

<script>
var U='',QP='mc';
var IMG="https://cyberboy161.github.io/Taybeti/card-bg.png";
var SITE=function(){return document.getElementById('qd').value==='home'?'https://cyberboy161.github.io/Taybeti/index.html':'https://cyberboy161.github.io/Taybeti/invited.html'};
var QRU=function(){return"https://api.qrserver.com/v1/create-qr-code/?size=60x60&data="+encodeURIComponent(SITE())};
var OVERLAY='<div style="position:absolute;inset:0;z-index:1;background:rgba(0,0,0,0.4)"></div>';

document.getElementById('pg').onclick=function(e){
 var btn=e.target.closest('button');if(!btn)return;
 document.querySelectorAll('#pg button').forEach(function(x){x.classList.remove('sel')});
 btn.classList.add('sel');QP=btn.dataset.p;buildCards();
};

function up(i){if(!i.files||!i.files[0])return;var r=new FileReader();r.onload=function(e){U=e.target.result;b()};r.readAsDataURL(i.files[0])}

function bgs(k){
 var m={'matrix':'background:#000;background-image:linear-gradient(rgba(0,255,0,.08)1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.08)1px,transparent 1px);background-size:3px 3px',
 'red':'background:linear-gradient(135deg,#1a0000,#2d0000,#1a0000)','blue':'background:radial-gradient(ellipse at center,#0a1628,#020810)',
 'circuit':'background:#0a0f0a;background-image:linear-gradient(rgba(0,200,0,.06)1px,transparent 1px),linear-gradient(90deg,rgba(0,200,0,.06)1px,transparent 1px),radial-gradient(circle,rgba(0,200,0,.1)1px,transparent 1px);background-size:6px 6px,6px 6px,12px 12px;background-position:0 0,0 0,3px 3px',
 'fire':'background:linear-gradient(180deg,#1a0500,#331100,#1a0500,#330000)','ice':'background:linear-gradient(180deg,#001122,#003355,#001122)',
 'neon':'background:#0d0d0d;background-image:linear-gradient(rgba(255,0,128,.05)2px,transparent 2px),linear-gradient(90deg,rgba(0,255,255,.05)2px,transparent 2px);background-size:6mm 6mm,6mm 6mm',
 'dark':'background:linear-gradient(135deg,#0d1117,#161b22,#0d1117)','gold':'background:linear-gradient(160deg,#1a1a0a,#2a2010,#1a1a0a)'};
 if(U)return'background:url('+U+') center/cover';
 if(k==='cyber')return'background:url('+IMG+') center/cover';
 return m[k]||'#111';
}

function ft(){
 return '<div class="w">وێنەی مەگرە. بە کەس مەڵێ. بە دەنگی بەرز مەیخوێنەرەوە. بە پارێزراوی بیھێڵەرەوە.<br>Do not photograph. Do not share. Do not read aloud. Keep safe.<br>Nicht fotografieren. Nicht teilen. Nicht laut vorlesen. Sicher aufbewahren.</div><div class="l"></div>';
}

function qrPos(p){
 var a={tl:'flex-start;justify-content:flex-start',tc:'flex-start;justify-content:center',tr:'flex-start;justify-content:flex-end',ml:'center;justify-content:flex-start',mc:'center;justify-content:center',mr:'center;justify-content:flex-end',bl:'flex-end;justify-content:flex-start',bc:'flex-end;justify-content:center',br:'flex-end;justify-content:flex-end'};
 return 'align-items:'+(a[p]||a.mc);
}

function bk(bg){
 var ph=document.getElementById('ph').value.trim(),em=document.getElementById('em').value.trim();
 var ci=ph||em?'<div class="inf">'+(ph?'📞'+ph:'')+(ph&&em?' · ':'')+(em?'📧'+em:'')+'</div>':'';
 return '<div class="im" style="'+bgs(bg)+'"></div>'+(bg==='cyber'?OVERLAY:'')+'<div class="cx" style="'+qrPos(QP)+'"><div class="qr" style="width:12mm;height:12mm"><img src="'+QRU()+'" style="width:100%;height:100%"></div></div><div class="url">'+SITE()+'</div>'+ci;
}

function buildCards(){
 var lo=document.getElementById('lo').value,bg=document.getElementById('bg').value;
 var ph=document.getElementById('ph').value.trim(),em=document.getElementById('em').value.trim();

 function makeCard(ps){
  if(ps==='2v'){
   return '<div class="card vert">'+
    '<div class="h front">'+ft()+'<div class="l"></div></div>'+
    '<div class="h front">'+ft()+'<div class="l"></div></div></div>';
  } else if(ps==='1'){
   return '<div class="card"><div class="h front">'+ft()+'</div></div>';
  } else {
   return '<div class="card"><div class="h front" style="border-bottom:1.5px dashed #000">'+ft()+'</div><div class="h front">'+ft()+'</div></div>';
  }
 }
 function makeBackCard(ps,bg){
  var cu = document.getElementById('customUrl').value.trim();
  var custQr = cu ? '<div class="qr" style="width:12mm;height:12mm"><img src="https://api.qrserver.com/v1/create-qr-code/?size=60x60&data='+encodeURIComponent(cu)+'" style="width:100%;height:100%"></div>' : '';
  var bc=function(){
   return '<div class="im" style="'+bgs(bg)+'"></div>'+(bg==='cyber'?OVERLAY:'')+
    '<div class="cx" style="'+qrPos(QP)+'">'+
    '<div class="qr" style="width:12mm;height:12mm"><img src="'+QRU()+'" style="width:100%;height:100%"></div>'+
    custQr+
    '</div>'+
    '<div class="url">'+SITE()+'</div>'+(ph||em?'<div class="inf">'+(ph?'📞'+ph:'')+(ph&&em?' · ':'')+(em?'📧'+em:'')+'</div>':'');
  };
  if(ps==='2v'){
   return '<div class="card vert"><div class="h back" style="border-right:1px dashed #fff8;background:#111">'+bc()+'</div><div class="h back" style="background:#111">'+bc()+'</div></div>';
  } else if(ps==='1'){
   return '<div class="card"><div class="h back" style="background:#111">'+bc()+'</div></div>';
  } else {
   return '<div class="card"><div class="h back" style="border-bottom:1px dashed #fff8;background:#111">'+bc()+'</div><div class="h back" style="background:#111">'+bc()+'</div></div>';
  }
 }

 // Preview — 1 card
 document.getElementById('previewFront').innerHTML=makeCard(lo);
 document.getElementById('previewBack').innerHTML=makeBackCard(lo,bg);

 // Print grid — 8 cards
 var pf=document.getElementById('pf'),pb=document.getElementById('pb');
 pf.innerHTML='';pb.innerHTML='';
 // Adjust grid
 pf.style.gridTemplateColumns='repeat(4,1fr)';pf.style.gridTemplateRows='1fr 1fr';
 pb.style.gridTemplateColumns='repeat(4,1fr)';pb.style.gridTemplateRows='1fr 1fr';
 for(var i=0;i<8;i++){
  pf.innerHTML+=makeCard(lo);
  pb.innerHTML+=makeBackCard(lo,bg);
 }
}
buildCards();
</script>
</body>
</html>
