<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taybeti Notesharing – Passphrase Cards</title>
    <style>
        @page { size: A4; margin: 5mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', Courier, monospace; background: #fff; color: #111; }

        .page {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2.5mm;
            width: 100%;
            min-height: 100vh;
        }
        .card {
            position: relative;
            border: 1.5px solid #777;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* ── FRONT SIDE ── */
        .front .half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
        }
        .front .half-top {
            border-bottom: 1.5px dashed #000;
        }
        .front .write-line {
            width: 80%;
            border-bottom: 1px solid #666;
            min-height: 12px;
        }

        /* ── BACK SIDE ── */
        .back .half {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .back .half-top {
            border-bottom: 1.5px dashed #000;
        }
        /* Decorative frame to disguise the QR code */
        .qr-frame {
            position: relative;
            width: 24mm;
            height: 24mm;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Outer decorative border */
        .qr-frame::before {
            content: '';
            position: absolute;
            inset: -2mm;
            border: 1px solid #aaa;
            border-radius: 3px;
            pointer-events: none;
        }
        /* Inner decorative dots at corners */
        .qr-corner {
            position: absolute;
            width: 3mm;
            height: 3mm;
            background: #999;
            border-radius: 50%;
            z-index: 2;
        }
        .qr-corner.tl { top: -1.5mm; left: -1.5mm; }
        .qr-corner.tr { top: -1.5mm; right: -1.5mm; }
        .qr-corner.bl { bottom: -1.5mm; left: -1.5mm; }
        .qr-corner.br { bottom: -1.5mm; right: -1.5mm; }
        /* Cross-hatch lines behind QR to break up the pattern */
        .qr-hatch {
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 1.2mm, rgba(0,0,0,0.04) 1.2mm, rgba(0,0,0,0.04) 1.3mm),
                repeating-linear-gradient(-45deg, transparent, transparent 1.2mm, rgba(0,0,0,0.04) 1.2mm, rgba(0,0,0,0.04) 1.3mm);
            pointer-events: none;
            z-index: 1;
        }
        .qr-wrap {
            width: 20mm;
            height: 20mm;
            position: relative;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-wrap img {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Small "seal" or "stamp" text below each QR */
        .qr-label {
            font-size: 4px;
            color: #bbb;
            text-align: center;
            margin-top: 1mm;
            letter-spacing: 0.5px;
        }

        /* ── Cut indicators ── */
        .scissor-l {
            position: absolute; left: -5px; top: calc(50% - 6px);
            font-size: 10px; color: #555; z-index: 3;
        }
        .scissor-r {
            position: absolute; right: -5px; top: calc(50% - 6px);
            font-size: 10px; color: #555; z-index: 3;
        }

        /* ── Info bar ── */
        .info-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111;
            color: #fff; text-align: center; padding: 6px; font-size: 12px; z-index: 9999;
        }
        .info-bar button {
            background: #555; color: #fff; border: none; padding: 6px 18px;
            border-radius: 6px; cursor: pointer; font-size: 13px; margin: 0 6px;
        }

        @media print {
            .info-bar { display: none; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card { page-break-inside: avoid; }
        }
        @media screen and (max-width: 600px) {
            .page { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
        }
    </style>
</head>
<body>

    <div class="page" id="pageFront"></div>
    <div class="page" id="pageBack"></div>

    <div class="info-bar">
        🖨️ Page 1 = passphrases &nbsp;|&nbsp; Page 2 = back side &nbsp;
        <button onclick="window.print()">🖨️ Print Both (Duplex)</button>
    </div>

<script>
var URL = "https://cyberboy161.github.io/Taybeti/";
function qrImg(size) {
    return "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size + "&data=" + encodeURIComponent(URL);
}

function frontCard() {
    var card = document.createElement('div');
    card.className = 'card front';
    card.innerHTML =
        '<div class="half half-top">' +
            '<div class="write-line"></div>' +
        '</div>' +
        '<div class="half">' +
            '<div class="write-line"></div>' +
        '</div>' +
        '<span class="scissor-l">✂</span>' +
        '<span class="scissor-r">✂</span>';
    return card;
}

function backCard() {
    var card = document.createElement('div');
    card.className = 'card back';
    card.innerHTML =
        '<div class="half half-top">' +
            '<div class="qr-frame">' +
                '<span class="qr-corner tl"></span>' +
                '<span class="qr-corner tr"></span>' +
                '<span class="qr-corner bl"></span>' +
                '<span class="qr-corner br"></span>' +
                '<div class="qr-hatch"></div>' +
                '<div class="qr-wrap"><img src="' + qrImg(82) + '" alt=""></div>' +
            '</div>' +
        '</div>' +
        '<div class="half">' +
            '<div class="qr-frame">' +
                '<span class="qr-corner tl"></span>' +
                '<span class="qr-corner tr"></span>' +
                '<span class="qr-corner bl"></span>' +
                '<span class="qr-corner br"></span>' +
                '<div class="qr-hatch"></div>' +
                '<div class="qr-wrap"><img src="' + qrImg(82) + '" alt=""></div>' +
            '</div>' +
        '</div>' +
        '<span class="scissor-l">✂</span>' +
        '<span class="scissor-r">✂</span>';
    return card;
}

var pf = document.getElementById('pageFront');
var pb = document.getElementById('pageBack');
for (var i = 0; i < 8; i++) {
    pf.appendChild(frontCard());
    pb.appendChild(backCard());
}
</script>
</body>
</html>
