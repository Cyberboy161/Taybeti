<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gre Cards — Builder</title>
<style>
@page{size:A4 portrait;margin:3mm}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#111;color:#eee;overflow:hidden;height:100vh}
#top{position:fixed;top:0;left:0;right:0;z-index:200;background:#0a0a0a;border-bottom:1px solid #222;padding:5px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px}
#top label{color:#888;font-size:10px}
#top select,#top input{background:#1a1a1a;color:#eee;border:1px solid #333;padding:3px 6px;border-radius:4px;font-size:10px}
#top .g{display:flex;align-items:center;gap:3px;background:#151515;padding:2px 6px;border-radius:5px}
.btn{background:#4f9cf7;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-weight:600;font-size:11px}
.btn.green{background:#2ecc40}
#top a{color:#555;text-decoration:none;font-size:10px}

#app{display:flex;height:100vh;padding-top:50px}
#panel{width:200px;background:#151515;border-right:1px solid #222;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;font-size:10px}
#panel h3{color:#fff;font-size:12px;border-bottom:1px solid #333;padding-bottom:3px;margin:0}
#panel .elem{background:#1a1a1a;border:1px solid #333;border-radius:5px;padding:6px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px}
#panel .elem:hover{background:#222}
#panel .elem.sel{border-color:#4f9cf7;background:#152030}
#panel .elem .ic{font-size:16px;width:20px;text-align:center}
#panel .elem .lb{flex:1}
#panel .elem .lb .sub{font-size:8px;color:#777}

.arr{display:grid;grid-template-columns:28px 28px 28px;grid-template-rows:28px 28px 28px;gap:2px;justify-content:center;margin:2px 0}
.arr button{background:#222;color:#aaa;border:1px solid #333;border-radius:3px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.arr button:hover{background:#4f9cf7;color:#fff;border-color:#4f9cf7}
.arr button.ac{grid-column:2;grid-row:1}
.arr button.al{grid-column:1;grid-row:2}.arr button.ar{grid-column:3;grid-row:2}
.arr button.ad{grid-column:2;grid-row:3}
.arr button.am{grid-column:2;grid-row:2;font-size:10px}
.szrow{display:flex;gap:2px}
.szrow button{flex:1;background:#222;color:#aaa;border:1px solid #333;border-radius:3px;padding:3px;cursor:pointer;font-size:10px}
.szrow button:hover{background:#4f9cf7;color:#fff}

#preview{flex:1;display:flex;flex-direction:column;align-items:center;padding:12px;overflow-y:auto;gap:10px}
#preview h2{color:#fff;font-size:13px;margin:0}
.cw{display:flex;flex-direction:column;align-items:center}
.cd{background:#fff;border:1px solid #444;border-radius:2px;overflow:hidden;position:relative;color:#111;width:160px;height:220px;box-shadow:0 3px 15px rgba(0,0,0,.5)}
.cd .ft{height:100%;display:flex;flex-direction:column;padding:3mm 4mm}
.cd .ft .w{font-size:6.5px;color:#333;text-align:center;line-height:1.25;margin-bottom:1.5mm}
.cd .ft .l{width:65%;border-bottom:1px solid #444;flex:1;min-height:6mm}
.cd .bk{height:100%;position:relative;background:#111;overflow:hidden}
.cd .bk .bgl{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cd .bk .bgl div{width:100%;height:100%}
.cd .bk .el{position:absolute;z-index:2;pointer-events:none}
.cd .bk .qr-w{background:#fff;border-radius:0.8mm;padding:0.8mm;box-shadow:0 0 1mm rgba(0,0,0,.5);display:flex}
.cd .bk .qr-w img{display:block}
.cd .bk .tx{font-size:5px;color:#fff;text-shadow:0 0 2px #000;line-height:1.2}

.ready-mode #panel{display:none}
.ready-mode #preview{display:none}
.ready-mode .prn{display:grid!important}

.prn{display:none;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:2mm;max-width:204mm;margin:0 auto;padding:10px}
.prn .cd{width:auto;height:auto;box-shadow:none}
.prn .cd .ft{min-height:0}
.prn .cd .ft .w{font-size:5px}
.prn .cd .ft .l{min-height:4mm}

@media print{#top{display:none}#app{display:block;height:auto;padding:0}#panel{display:none}#preview{display:none}.prn{display:grid!important}body{background:#fff}}
</style>
</head>
<body>

<div id="top">
    <div class="g"><label>Layout</label><select id="lo" onchange="u()"><option value="2h">2 strips</option><option value="1">1</option><option value="2v">2 vert</option></select></div>
    <div class="g"><label>Design</label><select id="ds" onchange="u()">
        <option value="cyber">Cyber</option><option value="matrix">Matrix</option><option value="red">Red</option><option value="blue">Blue</option><option value="circuit">Circuit</option><option value="fire">Fire</option><option value="ice">Ice</option><option value="neon">Neon</option><option value="dark">Dark</option><option value="gold">Gold</option></select></div>
    <div class="g"><label>Img</label><input type="file" accept="image/*" onchange="upImg(this)"></div>
    <div class="g"><label>QR→</label><select id="qd" onchange="u()"><option value="home">Home</option><option value="invited">Invited</option></select></div>
    <div class="g"><input id="ph" placeholder="Phone" oninput="u()" style="width:60px"><input id="em" placeholder="Email" oninput="u()" style="width:60px"></div>
    <div class="g"><input id="cq" placeholder="Custom QR URL" oninput="u()" style="width:100px"></div>
    <button class="btn" onclick="window.print()">🖨️ Print</button>
    <a href="index.html">🏠</a>
</div>

<div id="app">
    <div id="panel">
        <h3>Select Element</h3>
        <div class="elem sel" data-el="qr" onclick="sel('qr')"><span class="ic">▣</span><div class="lb">Website QR<div class="sub">Move + resize</div></div></div>
        <div class="elem" data-el="qr2" onclick="sel('qr2')"><span class="ic">▣</span><div class="lb">Custom QR<div class="sub">Instagram etc</div></div></div>
        <div class="elem" data-el="url" onclick="sel('url')"><span class="ic">🔗</span><div class="lb">URL Text<div class="sub">Font size ↑↓</div></div></div>
        <div class="elem" data-el="contact" onclick="sel('contact')"><span class="ic">📋</span><div class="lb">Contact Info<div class="sub">Font size ↑↓</div></div></div>
        <div class="elem" data-el="custom" onclick="sel('custom')"><span class="ic">✏️</span><div class="lb">Custom Text<div class="sub">Your own words</div></div></div>
        <div class="elem" data-el="bg" onclick="sel('bg')"><span class="ic">🖼️</span><div class="lb">Background<div class="sub">Zoom + rotate</div></div></div>

        <div class="arr">
            <button class="ac" onclick="mv(0,-1)">▲</button>
            <button class="al" onclick="mv(-1,0)">◀</button>
            <button class="am" onclick="resetEl()" title="Reset">↺</button>
            <button class="ar" onclick="mv(1,0)">▶</button>
            <button class="ad" onclick="mv(0,1)">▼</button>
        </div>

        <div class="szrow">
            <button onclick="sizeEl(-1)">A−</button>
            <button onclick="sizeEl(1)">A+</button>
        </div>

        <div style="display:flex;gap:3px;flex-wrap:wrap">
            <button class="btn" style="font-size:9px;padding:3px 6px;flex:1" onclick="rotateBg(-90)">↺90°</button>
            <button class="btn" style="font-size:9px;padding:3px 6px;flex:1" onclick="rotateBg(90)">90°↻</button>
        </div>
        <div class="szrow">
            <button onclick="zoomBg(-10)">◉−</button>
            <button onclick="zoomBg(10)">◉+</button>
        </div>
        <button class="btn green" onclick="toggleReady()" id="readyBtn" style="margin-top:4px">✅ Ready for Print</button>
    </div>

    <div id="preview">
        <h2>📝 Front</h2><div class="cw" id="pf"></div>
        <h2>🖼️ Back</h2><div class="cw" id="pb"></div>
    </div>
</div>

<div class="prn" id="prf"></div>
<div class="prn" id="prb"></div>

<script>
var IMG="https://cyberboy161.github.io/Taybeti/card-bg.png";var uploaded='';var selEl='qr';var ready=false;
var el={qr:{x:30,y:30,w:26,h:26},qr2:{x:60,y:30,w:26,h:26},url:{x:50,y:2,w:7,h:0},contact:{x:50,y:88,w:6,h:0},custom:{x:50,y:50,w:7,h:0},bg:{x:0,y:0,w:100,h:100,rot:0}};

function SITE(){return document.getElementById('qd').value==='home'?'https://cyberboy161.github.io/Taybeti/index.html':'https://cyberboy161.github.io/Taybeti/invited.html'}
function QRU(u){return"https://api.qrserver.com/v1/create-qr-code/?size=60x60&data="+encodeURIComponent(u||SITE())}

function upImg(i){if(i.files&&i.files[0]){var r=new FileReader();r.onload=function(e){uploaded=e.target.result;u()};r.readAsDataURL(i.files[0])}}
function sel(e){selEl=e;document.querySelectorAll('#panel .elem').forEach(function(x){x.classList.toggle('sel',x.dataset.el===e)})}
function mv(dx,dy){var p=el[selEl];if(!p)return;p.x=Math.max(0,Math.min(95,(p.x||0)+dx*4));p.y=Math.max(0,Math.min(95,(p.y||0)+dy*4));u()}
function resetEl(){var p=el[selEl];if(!p)return;var d={qr:[30,30],qr2:[60,30],url:[50,2],contact:[50,88],custom:[50,50]};var df=d[selEl]||[50,50];p.x=df[0];p.y=df[1];u()}
function sizeEl(d){var p=el[selEl];if(!p||selEl==='bg')return;
 if(selEl==='url'||selEl==='contact'||selEl==='custom'){p.w=Math.max(3,Math.min(20,(p.w||6)+d));u()}
 else{p.w=Math.max(6,Math.min(50,(p.w||10)+d*3));p.h=p.w;u()}}
function rotateBg(d){el.bg.rot=(el.bg.rot||0)+d;u()}
function zoomBg(d){el.bg.w=Math.max(30,Math.min(200,(el.bg.w||100)+d));el.bg.h=el.bg.w;u()}
function toggleReady(){ready=!ready;document.body.classList.toggle('ready-mode',ready);document.getElementById('readyBtn').textContent=ready?'✏️ Back to Edit':'✅ Ready for Print';if(ready)buildPrint()}

function bgStyle(k){
    var m={matrix:'#000;background-image:linear-gradient(rgba(0,255,0,.08)1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.08)1px,transparent 1px);background-size:3px 3px',
    red:'linear-gradient(135deg,#1a0000,#2d0000,#1a0000)',blue:'radial-gradient(ellipse at center,#0a1628,#020810)',
    circuit:'#0a0f0a;background-image:linear-gradient(rgba(0,200,0,.06)1px,transparent 1px),linear-gradient(90deg,rgba(0,200,0,.06)1px,transparent 1px),radial-gradient(circle,rgba(0,200,0,.1)1px,transparent 1px);background-size:6px 6px,6px 6px,12px 12px;background-position:0 0,0 0,3px 3px',
    fire:'linear-gradient(180deg,#1a0500,#331100,#1a0500,#330000)',ice:'linear-gradient(180deg,#001122,#003355,#001122)',
    neon:'#0d0d0d;background-image:linear-gradient(rgba(255,0,128,.05)2px,transparent 2px),linear-gradient(90deg,rgba(0,255,255,.05)2px,transparent 2px);background-size:6mm 6mm,6mm 6mm',
    dark:'linear-gradient(135deg,#0d1117,#161b22,#0d1117)',gold:'linear-gradient(160deg,#1a1a0a,#2a2010,#1a1a0a)'};
    var u=document.getElementById('customText');var ct=u?u.value.trim():'';
    return uploaded?'url('+uploaded+') center/cover':(k==='cyber'?'url('+IMG+') center/cover':m[k]||m.dark)
}
function ft(){return'<div class="w">وێنەی مەگرە. بە کەس مەڵێ. بە دەنگی بەرز مەیخوێنەرەوە.<br>Do not photograph. Do not share.<br>Nicht fotografieren. Nicht teilen.</div><div class="l"></div>'}

function backHalf(bgKey,isPrint){
    var ph=document.getElementById('ph').value.trim(),em=document.getElementById('em').value.trim();
    var cq=document.getElementById('cq').value.trim();
    var ct=document.getElementById('custTxt')?document.getElementById('custTxt').value.trim():'';
    var sz=isPrint?0.6:1;
    var bgHtml='<div class="bgl" style="transform:rotate('+el.bg.rot+'deg) scale('+(el.bg.w/100)*sz+')"><div style="background:'+bgStyle(bgKey)+';width:100%;height:100%"></div></div>';
    var qr1='<div class="el" style="left:'+el.qr.x+'%;top:'+el.qr.y+'%"><div class="qr-w" style="width:'+(el.qr.w*sz)+'px;height:'+(el.qr.h*sz)+'px"><img src="'+QRU()+'" style="width:100%;height:100%"></div></div>';
    var qr2=cq?'<div class="el" style="left:'+el.qr2.x+'%;top:'+el.qr2.y+'%"><div class="qr-w" style="width:'+(el.qr2.w*sz)+'px;height:'+(el.qr2.h*sz)+'px"><img src="'+QRU(cq)+'" style="width:100%;height:100%"></div></div>':'';
    var ux='<div class="el tx" style="left:'+el.url.x+'%;top:'+el.url.y+'%;font-size:'+(el.url.w*sz)+'px">'+SITE()+'</div>';
    var ci='';
    if(ph||em)ci='<div class="el tx" style="left:'+el.contact.x+'%;top:'+el.contact.y+'%;font-size:'+(el.contact.w*sz)+'px">'+(ph?'📞'+ph:'')+(ph&&em?' · ':'')+(em?'📧'+em:'')+'</div>';
    var cx=ct?'<div class="el tx" style="left:'+el.custom.x+'%;top:'+el.custom.y+'%;font-size:'+(el.custom.w*sz)+'px">'+ct+'</div>':'';
    return'<div class="bk">'+bgHtml+qr1+qr2+ux+ci+cx+'</div>';
}

function u(){
    var lo=document.getElementById('lo').value,bg=document.getElementById('ds').value;
    var fc=lo==='2v'?'<div class="cd" style="display:flex;flex-direction:row"><div class="ft" style="border-right:1.5px dashed #000">'+ft()+'</div><div class="ft">'+ft()+'</div></div>'
           :lo==='1'?'<div class="cd"><div class="ft">'+ft()+'</div></div>'
           :'<div class="cd"><div class="ft" style="border-bottom:1.5px dashed #000">'+ft()+'</div><div class="ft">'+ft()+'</div></div>';
    document.getElementById('pf').innerHTML=fc;
    var bc=lo==='2v'?'<div class="cd" style="display:flex;flex-direction:row"><div style="flex:1;position:relative;border-right:1px dashed #fff8">'+backHalf(bg,false)+'</div><div style="flex:1;position:relative">'+backHalf(bg,false)+'</div></div>'
           :lo==='1'?'<div class="cd">'+backHalf(bg,false)+'</div>'
           :'<div class="cd"><div style="position:relative;height:50%;border-bottom:1px dashed #fff8">'+backHalf(bg,false)+'</div><div style="position:relative;height:50%">'+backHalf(bg,false)+'</div></div>';
    document.getElementById('pb').innerHTML=bc;
}

function buildPrint(){
    var lo=document.getElementById('lo').value,bg=document.getElementById('ds').value;
    var pf=document.getElementById('prf'),pb=document.getElementById('prb');
    pf.innerHTML='';pb.innerHTML='';
    var cols=4,rows=2;if(lo==='2v'||lo==='2'){cols=4;rows=6}
    pf.style.gridTemplateColumns='repeat('+cols+',1fr)';pf.style.gridTemplateRows='repeat('+rows+',1fr)';
    pb.style.gridTemplateColumns='repeat('+cols+',1fr)';pb.style.gridTemplateRows='repeat('+rows+',1fr)';
    var total=cols*rows;
    for(var i=0;i<total;i++){
        pf.innerHTML+=lo==='2v'?'<div class="cd" style="display:flex;flex-direction:row"><div class="ft" style="border-right:1.5px dashed #000">'+ft()+'</div><div class="ft">'+ft()+'</div></div>'
            :lo==='1'?'<div class="cd"><div class="ft">'+ft()+'</div></div>'
            :'<div class="cd"><div class="ft" style="border-bottom:1.5px dashed #000">'+ft()+'</div><div class="ft">'+ft()+'</div></div>';
        pb.innerHTML+=lo==='2v'?'<div class="cd" style="display:flex;flex-direction:row"><div style="flex:1;position:relative;border-right:1px dashed #fff8">'+backHalf(bg,true)+'</div><div style="flex:1;position:relative">'+backHalf(bg,true)+'</div></div>'
            :lo==='1'?'<div class="cd">'+backHalf(bg,true)+'</div>'
            :'<div class="cd"><div style="position:relative;height:50%;border-bottom:1px dashed #fff8">'+backHalf(bg,true)+'</div><div style="position:relative;height:50%">'+backHalf(bg,true)+'</div></div>';
    }
}
u()
</script>
</body>
</html>
