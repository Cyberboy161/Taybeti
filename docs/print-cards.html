<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taybeti Notesharing – Passphrase Cards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #fff; color: #111; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding-top: 42px; }
        h2 { text-align: center; font-size: 13px; margin: 4px 0; color: #aaa; font-weight: 400; }

        .page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            gap: 1.5mm;
            width: 210mm;
            height: 285mm;
            margin: 0 auto;
        }
        .card {
            position: relative;
            border: 1px solid #999;
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .half {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }
        .half-top { border-bottom: 1.5px dashed #000; }
        .scissor-l {
            position: absolute; left: -5px; top: 50%; transform: translateY(-50%);
            font-size: 10px; color: #555; z-index: 5;
        }
        .scissor-r {
            position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
            font-size: 10px; color: #555; z-index: 5;
        }

        /* Front */
        .front .card { background: #fff; border-color: #999; }
        .front .half {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 4px 8px 6px;
        }
        .front .write-line {
            width: 80%;
            border-bottom: 1px solid #666;
            min-height: 13px;
        }

        /* Back */
        .back .card { background: #111; border-color: #bbb; }
        .back .half {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 2mm;
        }
        .back .half-top { border-bottom-color: #fff8; }
        .back .scissor-l, .back .scissor-r { color: #fff; }
        .back .bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .back .qr-box {
            position: relative;
            z-index: 1;
            width: 16mm;
            height: 16mm;
            background: #fff;
            border-radius: 1mm;
            padding: 1mm;
            box-shadow: 0 0 2mm rgba(0,0,0,0.5);
        }
        .back .qr-box img { width: 100%; height: 100%; display: block; }

        .break { page-break-after: always; margin: 0; border: none; }

        .action-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111;
            color: #fff; text-align: center; padding: 7px; font-size: 12px; z-index: 9999;
        }
        .action-bar button {
            background: #444; color: #fff; border: none; padding: 6px 18px;
            border-radius: 6px; cursor: pointer; font-size: 13px; margin: 0 4px;
        }

        @media print {
            @page { size: A4 portrait; margin: 3mm; }
            .action-bar { display: none; }
            [style*="position:fixed"] { display: none; }
            .page { min-height: 0; max-height: 100%; }
            .card { page-break-inside: avoid; }
            .break { page-break-after: always; }
            h2 { font-size: 10px; margin: 2px 0; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        @media screen {
            .page { min-height: 0; }
            .action-bar button.primary { background: #4f9cf7; font-weight: 600; }
        }
        @media screen and (max-width: 600px) {
            .page { width: 100%; height: auto; grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
        }
    </style>
</head>
<body>

    <div style="position:fixed;top:0;left:0;width:100%;background:#111;border-bottom:1px solid #333;padding:6px 20px;display:flex;justify-content:center;gap:10px;z-index:9998;flex-wrap:wrap;">
        <a href="index.html" style="background:#333;border:1px solid #555;color:#ccc;padding:6px 14px;border-radius:20px;text-decoration:none;font-size:0.85rem;">🏠 Home</a>
        <a href="why.html" style="background:#333;border:1px solid #555;color:#ccc;padding:6px 14px;border-radius:20px;text-decoration:none;font-size:0.85rem;">❓ Why</a>
        <a href="opensource.html" style="background:#333;border:1px solid #555;color:#ccc;padding:6px 14px;border-radius:20px;text-decoration:none;font-size:0.85rem;">📖 Open Source</a>
        <a href="print-cards.html" style="background:#4f9cf7;border:1px solid #4f9cf7;color:#fff;padding:6px 14px;border-radius:20px;text-decoration:none;font-size:0.85rem;font-weight:600;">🖨️ Cards</a>
        <a href="invited.html" style="background:#333;border:1px solid #555;color:#ccc;padding:6px 14px;border-radius:20px;text-decoration:none;font-size:0.85rem;">📩 Invited</a>
    </div>

    <h2>Page 1 — Front</h2>
    <div class="page" id="pageFront"></div>
    <div class="break"></div>
    <h2>Page 2 — Back</h2>
    <div class="page" id="pageBack"></div>

    <div class="action-bar">
        🖨️ Print duplex or Save as PDF &nbsp;
        <button class="primary" onclick="window.print()">🖨️ Print / PDF</button>
    </div>

<script>
var U="https://cyberboy161.github.io/Taybeti/invited.html";
function Q(s){return"https://api.qrserver.com/v1/create-qr-code/?size="+s+"x"+s+"&data="+encodeURIComponent(U);}

function frontCard(){
    var labels = '<div style="font-size:3.5px;color:#999;text-align:center;line-height:1.45;margin-bottom:3px">'+
        'وێنەی مەگرە. بە کەس مەڵێ. بە دەنگی بەرز مەیخوێنەرەوە. بە پارێزراوی بیھێڵەرەوە.<br>'+
        'Wêneyê megre. Bi kesî mebêje. Bi dengê bilind mexwîne. Bi parastî bihêle.<br>'+
        'Do not photograph. Do not share. Do not read aloud. Keep safe.<br>'+
        'Nicht fotografieren. Nicht teilen. Nicht laut vorlesen. Sicher aufbewahren.<br>'+
        'Fotoğraf çekme. Kimseyle paylaşma. Yüksek sesle okuma. Güvende tut.'+
        '</div>';
    var c=document.createElement('div');c.className='card front';
    c.innerHTML='<div class="half half-top">'+labels+'<div class="write-line"></div></div>'+
        '<div class="half">'+labels+'<div class="write-line"></div></div>'+
        '<span class="scissor-l">✂</span><span class="scissor-r">✂</span>';
    return c;
}
function backHalf(cls){
    return '<div class="half'+cls+'">'+
        '<img class="bg-img" src="https://cyberboy161.github.io/Taybeti/card-bg.png" alt="">'+
        '<div class="qr-box"><img src="'+Q(60)+'" alt="QR"></div></div>';
}
function backCard(){
    var c=document.createElement('div');c.className='card back';
    c.innerHTML=backHalf(' half-top')+backHalf('')+
        '<span class="scissor-l">✂</span><span class="scissor-r">✂</span>';
    return c;
}

var F=document.getElementById('pageFront'),B=document.getElementById('pageBack');
for(var i=0;i<8;i++){F.appendChild(frontCard());B.appendChild(backCard());}
</script>
</body>
</html>
