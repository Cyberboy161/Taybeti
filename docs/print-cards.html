<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taybeti – Passphrase Cards</title>
<style>
@page{size:A4 portrait;margin:3mm}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia',serif;background:#f5f5f0;padding-top:40px;color:#111;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.bar{position:fixed;top:0;left:0;right:0;background:#111;padding:3px 10px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;z-index:100;font-size:11px}
.bar label{color:#999;font-size:10px}
.bar select,.bar input[type=file]{background:#222;color:#fff;border:1px solid #444;padding:3px 6px;border-radius:4px;font-size:10px}
.bar .g{display:flex;align-items:center;gap:3px;background:#1a1a1a;padding:2px 6px;border-radius:5px}
.pg{display:inline-grid;grid-template-columns:1fr 1fr 1fr;gap:1px;vertical-align:middle}
.pg button{background:#222;color:#999;border:1px solid #444;border-radius:2px;padding:1px 3px;font-size:8px;cursor:pointer;line-height:1.2}
.pg button.sel{background:#4f9cf7;border-color:#4f9cf7;color:#fff}
.prBtn{background:#4f9cf7;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-weight:600;font-size:11px}
.bar a{color:#555;text-decoration:none;font-size:10px}
.bar input[type=text]{background:#222;color:#fff;border:1px solid #444;padding:2px 5px;border-radius:3px;font-size:10px;width:70px}

h2{text-align:center;font-size:11px;color:#aaa;font-weight:400;margin:4px 0 1px}
.pg-wrap{max-width:1200px;margin:0 auto;padding:0 10px}
.pg{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:2mm;width:210mm;margin:0 auto}
.cd{position:relative;border:1px solid #999;display:flex;flex-direction:column;background:#fff;overflow:hidden;min-height:0}
@media screen{.pg{width:auto;max-width:420px;margin:0 auto;display:block}.cd+.cd,.pg>*+.pg>*{display:none;}.cd{max-width:100%;margin:0 auto;border-color:#666;min-height:200px}.hr{border:1px dashed #444;margin:10px 0;display:block}.pg-wrap h2{font-size:14px;color:#fff;background:#4f9cf7;padding:5px 16px;border-radius:8px;display:inline-block;margin:6px auto 10px;text-align:center;width:auto}.pg-wrap{max-width:500px;margin:0 auto;padding:0 10px}body{background:#1a1a1a;padding-top:50px}.bar{z-index:200}}
@media print{body{background:#fff}.cd{display:flex!important}.hr{display:none}}
.cd.vr{flex-direction:row}.cd.vr .h{border-right:1px dashed #000;flex:1}
.h{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1mm 2mm;position:relative;min-height:0}
.h+.h{border-top:1.5px dashed #000}
.ft .w{width:100%;font-size:6.5px;color:#333;text-align:center;line-height:1.3;margin-bottom:1px}
.ft .l{width:75%;border-bottom:1px solid #444;min-height:6mm}
.bk .h{background:#111}
.bk .im{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.bk .cx{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:1mm;padding:1mm;width:100%}
.bk .qr{background:#fff;border-radius:0.8mm;padding:0.8mm;box-shadow:0 0 1.5mm rgba(0,0,0,.5);display:flex}
.bk .qr img{display:block}
.bk .inf{position:absolute;bottom:0.5mm;left:1mm;right:1mm;z-index:3;font-size:3.5px;color:#fff;text-align:center;text-shadow:0 0 2px #000;line-height:1.3}
.bk .url{position:absolute;top:0.5mm;left:1mm;right:1mm;z-index:3;font-size:2.8px;color:#fffd;text-align:center;text-shadow:0 0 2px #000;word-break:break-all}

@media print{.bar{display:none}.pg-wrap{padding:0}}
</style>
</head>
<body>
<div class="bar">
    <div class="g"><label>Layout</label><select id="lo" onchange="b()">
        <option value="2h">2 strips</option><option value="1">1 (no cut)</option><option value="2v">2 vertical</option>
    </select></div>
    <div class="g"><label>Design</label><select id="bg" onchange="b()">
        <option value="cyber">Cybersecurity</option><option value="matrix">Matrix</option><option value="red">Red</option>
        <option value="blue">Blue</option><option value="circuit">Circuit</option><option value="fire">Fire</option>
        <option value="ice">Ice</option><option value="neon">Neon</option><option value="dark">Dark</option><option value="gold">Gold</option>
    </select></div>
    <div class="g"><label>Image</label><input type="file" accept="image/*" onchange="up(this)"></div>
    <div class="g"><label>QR→</label><select id="qd" onchange="b()">
        <option value="home">Homepage</option><option value="invited">Invited</option>
    </select></div>
    <div class="g"><label>QR pos</label><div class="pg" id="pg">
        <button data-p="tl">↖</button><button data-p="tc">↑</button><button data-p="tr">↗</button>
        <button data-p="ml">←</button><button data-p="mc" class="sel">●</button><button data-p="mr">→</button>
        <button data-p="bl">↙</button><button data-p="bc">↓</button><button data-p="br">↘</button>
    </div></div>
    <div class="g"><input id="ph" placeholder="Phone" oninput="b()" style="width:80px">
    <input id="em" placeholder="Email" oninput="b()" style="width:80px"></div>
    <button class="prBtn" onclick="window.print()">🖨️ Print</button>
    <a href="index.html">🏠</a>
</div>

<div class="pg-wrap">
<h2>📝 Front</h2><div class="pg" id="pf"></div>
<hr class="hr" style="border:1px dashed #ccc;margin:6px 0;page-break-after:always">
<h2>🖼️ Back</h2><div class="pg" id="pb"></div>
</div>

<script>
var U='',QP='mc';
var IMG="https://cyberboy161.github.io/Taybeti/card-bg.png";
var SITE=function(){return document.getElementById('qd').value==='home'?'https://cyberboy161.github.io/Taybeti/index.html':'https://cyberboy161.github.io/Taybeti/invited.html'};
var QRU=function(){return"https://api.qrserver.com/v1/create-qr-code/?size=60x60&data="+encodeURIComponent(SITE())};
var OVERLAY='<div style="position:absolute;inset:0;z-index:1;background:rgba(0,0,0,0.4)"></div>';

document.getElementById('pg').onclick=function(e){
 var b=e.target.closest('button');if(!b)return;
 document.querySelectorAll('#pg button').forEach(function(x){x.classList.remove('sel')});
 b.classList.add('sel');QP=b.dataset.p;b();
};

function up(i){if(!i.files||!i.files[0])return;var r=new FileReader();r.onload=function(e){U=e.target.result;b()};r.readAsDataURL(i.files[0])}

function bgs(k){
 var m={'matrix':'background:#000;background-image:linear-gradient(rgba(0,255,0,.08)1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.08)1px,transparent 1px);background-size:3px 3px',
 'red':'background:linear-gradient(135deg,#1a0000,#2d0000,#1a0000)','blue':'background:radial-gradient(ellipse at center,#0a1628,#020810)',
 'circuit':'background:#0a0f0a;background-image:linear-gradient(rgba(0,200,0,.06)1px,transparent 1px),linear-gradient(90deg,rgba(0,200,0,.06)1px,transparent 1px),radial-gradient(circle,rgba(0,200,0,.1)1px,transparent 1px);background-size:6px 6px,6px 6px,12px 12px;background-position:0 0,0 0,3px 3px',
 'fire':'background:linear-gradient(180deg,#1a0500,#331100,#1a0500,#330000)','ice':'background:linear-gradient(180deg,#001122,#003355,#001122)',
 'neon':'background:#0d0d0d;background-image:linear-gradient(rgba(255,0,128,.05)2px,transparent 2px),linear-gradient(90deg,rgba(0,255,255,.05)2px,transparent 2px);background-size:6mm 6mm,6mm 6mm',
 'dark':'background:linear-gradient(135deg,#0d1117,#161b22,#0d1117)','gold':'background:linear-gradient(160deg,#1a1a0a,#2a2010,#1a1a0a)'};
 if(U)return'background:url('+U+') center/cover';
 if(k==='cyber')return'background:url('+IMG+') center/cover';
 return m[k]||'#111';
}

function ft(){
 return '<div class="w">وێنەی مەگرە. بە کەس مەڵێ. بە دەنگی بەرز مەیخوێنەرەوە. بە پارێزراوی بیھێڵەرەوە.<br>Do not photograph. Do not share. Do not read aloud. Keep safe.<br>Nicht fotografieren. Nicht teilen. Nicht laut vorlesen. Sicher aufbewahren.</div><div class="l"></div>';
}

function qrPos(p){
 var a={tl:'flex-start;justify-content:flex-start',tc:'flex-start;justify-content:center',tr:'flex-start;justify-content:flex-end',ml:'center;justify-content:flex-start',mc:'center;justify-content:center',mr:'center;justify-content:flex-end',bl:'flex-end;justify-content:flex-start',bc:'flex-end;justify-content:center',br:'flex-end;justify-content:flex-end'};
 return 'align-items:'+(a[p]||a.mc);
}

function bk(bg){
 var ph=document.getElementById('ph').value.trim(),em=document.getElementById('em').value.trim();
 var ci=ph||em?'<div class="inf">'+(ph?'📞'+ph:'')+(ph&&em?' · ':'')+(em?'📧'+em:'')+'</div>':'';
 return '<div class="im" style="'+bgs(bg)+'"></div>'+(bg==='cyber'?OVERLAY:'')+'<div class="cx" style="'+qrPos(QP)+'"><div class="qr" style="width:12mm;height:12mm"><img src="'+QRU()+'" style="width:100%;height:100%"></div></div><div class="url">'+SITE()+'</div>'+ci;
}

function b(){
 var pf=document.getElementById('pf'),pb=document.getElementById('pb');
 pf.innerHTML='';pb.innerHTML='';
 var lo=document.getElementById('lo').value,bg=document.getElementById('bg').value;
 if(lo==='1'){
  for(var i=0;i<8;i++){
   pf.innerHTML+='<div class="cd"><div class="h ft">'+ft()+'</div></div>';
   pb.innerHTML+='<div class="cd" style="border-color:#bbb"><div class="h bk">'+bk(bg)+'</div></div>';
  }
 }else if(lo==='2v'){
  for(var i=0;i<8;i++){
   pf.innerHTML+='<div class="cd vr"><div class="h ft" style="border-right:1.5px dashed #000">'+ft()+'</div><div class="h ft">'+ft()+'</div></div>';
   pb.innerHTML+='<div class="cd vr" style="border-color:#bbb"><div class="h bk" style="border-right:1px dashed #fff8">'+bk(bg)+'</div><div class="h bk">'+bk(bg)+'</div></div>';
  }
 }else{
  for(var i=0;i<8;i++){
   pf.innerHTML+='<div class="cd"><div class="h ft" style="border-bottom:1.5px dashed #000">'+ft()+'</div><div class="h ft">'+ft()+'</div></div>';
   pb.innerHTML+='<div class="cd" style="border-color:#bbb"><div class="h bk" style="border-bottom:1px dashed #fff8">'+bk(bg)+'</div><div class="h bk">'+bk(bg)+'</div></div>';
  }
 }
 document.querySelectorAll('h2').forEach(function(h){h.textContent='📝 8 per sheet';});
}
b();
</script>
</body>
</html>
