<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gre Cards — Builder</title>
<style>
@page{size:A4 portrait;margin:3mm}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#1a1a1a;padding:0;color:#eee}

#top{position:fixed;top:0;left:0;right:0;z-index:200;background:#111;border-bottom:1px solid #333;padding:6px 12px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;font-size:12px}
#top label{color:#aaa;font-size:11px}
#top select,#top input[type=file],#top input[type=text]{background:#222;color:#eee;border:1px solid #444;padding:4px 8px;border-radius:4px;font-size:11px}
#top .g{display:flex;align-items:center;gap:4px;background:#1c1c1c;padding:3px 8px;border-radius:6px}
.btn{background:#4f9cf7;color:#fff;border:none;padding:5px 14px;border-radius:4px;cursor:pointer;font-weight:600;font-size:11px}
.btn2{background:#333;color:#ccc;border:1px solid #555;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px}
#top a{color:#666;text-decoration:none;font-size:11px}

/* Layout: sidebar + preview */
#app{display:flex;height:calc(100vh - 56px);margin-top:56px}
#panel{width:220px;background:#181818;border-right:1px solid #333;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;font-size:11px}
#panel h3{color:#fff;font-size:13px;border-bottom:1px solid #333;padding-bottom:4px}
#panel label{color:#999;font-size:10px;display:block;margin-bottom:2px}
#panel .elem{background:#222;border:1px solid #444;border-radius:6px;padding:8px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
#panel .elem:hover{background:#2a2a2a}
#panel .elem.sel{border-color:#4f9cf7;background:#1a2840}
#panel .elem .icon{font-size:18px;width:24px;text-align:center}
#panel .elem .txt{flex:1;font-size:11px}
#panel .elem .txt .sub{font-size:9px;color:#888}

.arrows{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;width:80px;margin:4px auto}
.arrows button{background:#333;color:#ccc;border:1px solid #555;border-radius:3px;padding:4px;cursor:pointer;font-size:12px}
.arrows button:hover{background:#4f9cf7;color:#fff}
.arrows button.mid{width:28px;margin:0 auto}

#preview{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;overflow-y:auto;gap:16px}
#preview h2{color:#fff;font-size:14px;margin:0}
.card-wrap{display:flex;flex-direction:column;align-items:center}
.card{background:#fff;border:1px solid #555;border-radius:2px;overflow:hidden;position:relative;color:#111;width:180px;height:250px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.card .front{height:100%;display:flex;flex-direction:column;padding:4mm 5mm}
.card .front .warn{font-size:7px;color:#333;text-align:center;line-height:1.3;margin-bottom:2mm}
.card .front .line{width:70%;border-bottom:1px solid #444;flex:1;min-height:8mm}
.card .back{height:100%;position:relative;background:#111;overflow:hidden}
.card .back .bg{position:absolute;inset:0;pointer-events:none}
.card .back .bg img{width:100%;height:100%;object-fit:cover}
.card .back .el{position:absolute;z-index:2;pointer-events:none}
.card .back .qr-wrap{background:#fff;border-radius:1mm;padding:1mm;box-shadow:0 0 1.5mm rgba(0,0,0,.5);display:flex}
.card .back .qr-wrap img{display:block;width:32px;height:32px}
.card .back .el-text{font-size:6px;color:#fff;text-shadow:0 0 2px #000}

@media print{#top,#panel{display:none}#app{display:block;height:auto;margin:0}#preview{display:none}.print-grid{display:grid!important}}
.print-grid{display:none}
</style>
</head>
<body>

<div id="top">
    <div class="g"><label>Layout</label><select id="lo" onchange="u()"><option value="2h">2 strips</option><option value="1">1</option><option value="2v">2 vert</option></select></div>
    <div class="g"><label>Design</label><select id="bg" onchange="u()">
        <option value="cyber">Cyber</option><option value="matrix">Matrix</option><option value="red">Red</option><option value="blue">Blue</option><option value="circuit">Circuit</option><option value="fire">Fire</option><option value="ice">Ice</option><option value="neon">Neon</option><option value="dark">Dark</option><option value="gold">Gold</option></select></div>
    <div class="g"><label>Image</label><input type="file" accept="image/*" onchange="upImg(this)"></div>
    <div class="g"><label>QR→</label><select id="qd" onchange="u()"><option value="home">Home</option><option value="invited">Invited</option></select></div>
    <div class="g"><input id="ph" placeholder="Phone" oninput="u()" style="width:70px"><input id="em" placeholder="Email" oninput="u()" style="width:70px"></div>
    <button class="btn" onclick="window.print()">🖨️ Print</button>
    <a href="index.html">🏠</a>
</div>

<div id="app">
    <div id="panel">
        <h3>Select Element</h3>
        <div class="elem sel" data-el="qr" onclick="selectEl('qr')"><span class="icon">▣</span><div class="txt">QR Code<div class="sub">Move with arrows</div></div></div>
        <div class="elem" data-el="url" onclick="selectEl('url')"><span class="icon">🔗</span><div class="txt">URL Label<div class="sub">Website link</div></div></div>
        <div class="elem" data-el="contact" onclick="selectEl('contact')"><span class="icon">📋</span><div class="txt">Contact Info<div class="sub">Phone & email</div></div></div>
        <div class="elem" data-el="bg" onclick="selectEl('bg')"><span class="icon">🖼️</span><div class="txt">Background<div class="sub">Rotate too</div></div></div>

        <div class="arrows">
            <button onclick="moveEl(0,-1)">↑</button>
            <button onclick="moveEl(0, 1)">↓</button>
            <button onclick="moveEl(-1,0)">←</button>
            <button class="mid" onclick="resetEl()">↺</button>
            <button onclick="moveEl(1, 0)">→</button>
        </div>
        <div style="display:flex;gap:4px">
            <button class="btn2" onclick="rotateBg(-15)">↺ BG-</button>
            <button class="btn2" onclick="rotateBg(15)">BG+ ↻</button>
        </div>
    </div>

    <div id="preview">
        <h2>📝 Front</h2>
        <div class="card-wrap" id="previewFront"></div>
        <h2>🖼️ Back</h2>
        <div class="card-wrap" id="previewBack"></div>
    </div>
</div>

<div class="print-grid" id="printFront"></div>
<div class="print-grid" id="printBack"></div>

<script>
var IMG="https://cyberboy161.github.io/Taybeti/card-bg.png";
var uploaded='';
var selectedEl='qr';
var pos={qr:{x:50,y:40},url:{x:50,y:5},contact:{x:50,y:85},bg:{x:0,y:0,rot:0}};

function SITE(){return document.getElementById('qd').value==='home'?'https://cyberboy161.github.io/Taybeti/index.html':'https://cyberboy161.github.io/Taybeti/invited.html'}
function QRU(){return"https://api.qrserver.com/v1/create-qr-code/?size=60x60&data="+encodeURIComponent(SITE())}

function upImg(i){if(i.files&&i.files[0]){var r=new FileReader();r.onload=function(e){uploaded=e.target.result;u()};r.readAsDataURL(i.files[0])}}

function selectEl(el){
    selectedEl=el;
    document.querySelectorAll('#panel .elem').forEach(function(e){e.classList.toggle('sel',e.dataset.el===el)})
}

function moveEl(dx,dy){
    var p=pos[selectedEl];if(!p)return;
    p.x=Math.max(0,Math.min(95,(p.x||0)+dx*3));
    p.y=Math.max(0,Math.min(95,(p.y||0)+dy*3));
    u()
}

function resetEl(){var p=pos[selectedEl];if(p){p.x=50;p.y=selectedEl==='contact'?85:selectedEl==='url'?5:40;u()}}

function rotateBg(deg){
    pos.bg.rot=(pos.bg.rot||0)+deg;
    u()
}

function bgStyle(k){
    var s={'matrix':'#000;background-image:linear-gradient(rgba(0,255,0,.08)1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.08)1px,transparent 1px);background-size:3px 3px',
    'red':'linear-gradient(135deg,#1a0000,#2d0000,#1a0000)','blue':'radial-gradient(ellipse at center,#0a1628,#020810)',
    'circuit':'#0a0f0a;background-image:linear-gradient(rgba(0,200,0,.06)1px,transparent 1px),linear-gradient(90deg,rgba(0,200,0,.06)1px,transparent 1px),radial-gradient(circle,rgba(0,200,0,.1)1px,transparent 1px);background-size:6px 6px,6px 6px,12px 12px;background-position:0 0,0 0,3px 3px',
    'fire':'linear-gradient(180deg,#1a0500,#331100,#1a0500,#330000)','ice':'linear-gradient(180deg,#001122,#003355,#001122)',
    'neon':'#0d0d0d;background-image:linear-gradient(rgba(255,0,128,.05)2px,transparent 2px),linear-gradient(90deg,rgba(0,255,255,.05)2px,transparent 2px);background-size:6mm 6mm,6mm 6mm',
    'dark':'linear-gradient(135deg,#0d1117,#161b22,#0d1117)','gold':'linear-gradient(160deg,#1a1a0a,#2a2010,#1a1a0a)'};
    return uploaded?'url('+uploaded+') center/cover':(k==='cyber'?'url('+IMG+') center/cover':s[k]||s.cyber)
}

function ftHTML(){
    return'<div class="warn">وێنەی مەگرە. بە کەس مەڵێ. بە دەنگی بەرز مەیخوێنەرەوە.<br>Do not photograph. Do not share. Do not read aloud.<br>Nicht fotografieren. Nicht teilen. Nicht laut vorlesen.</div><div class="line"></div>';
}

function backHTML(bgKey,half){
    var ph=document.getElementById('ph').value.trim(),em=document.getElementById('em').value.trim();
    var bgHtml='<div class="bg" style="transform:rotate('+pos.bg.rot+'deg)"><div style="width:100%;height:100%;background:'+bgStyle(bgKey)+(bgKey==='cyber'||uploaded?'':'')+'"></div></div>';
    var qrHtml='<div class="el" style="left:'+pos.qr.x+'%;top:'+pos.qr.y+'%"><div class="qr-wrap"><img src="'+QRU()+'"></div></div>';
    var urlHtml='<div class="el el-text" style="left:'+pos.url.x+'%;top:'+pos.url.y+'%">'+SITE()+'</div>';
    var ci='';
    if(ph||em)ci='<div class="el el-text" style="left:'+pos.contact.x+'%;top:'+pos.contact.y+'%">'+(ph?'📞'+ph+' ':'')+(em?'📧'+em:'')+'</div>';
    return'<div class="back">'+bgHtml+qrHtml+urlHtml+ci+'</div>';
}

function u(){
    var lo=document.getElementById('lo').value,bg=document.getElementById('bg').value,fs=7;
    // Front preview
    var fc='<div class="card"><div class="front">';
    if(lo==='2v'){fc+=ftHTML()+'<div class="line" style="border-right:1.5px dashed #000"></div>'+ftHTML()+'<div class="line"></div>'}
    else if(lo==='1'){fc+=ftHTML()}
    else{fc+=ftHTML()+'<div style="border-top:1.5px dashed #000;margin:1mm 0"></div>'+ftHTML()}
    fc+='</div></div>';
    document.getElementById('previewFront').innerHTML=fc;

    // Back preview
    var bk=bg;
    if(lo==='2v'){document.getElementById('previewBack').innerHTML='<div class="card" style="display:flex;flex-direction:row">'+backHTML(bk,1)+backHTML(bk,2)+'</div>'}
    else if(lo==='1'){document.getElementById('previewBack').innerHTML='<div class="card">'+backHTML(bk,1)+'</div>'}
    else{document.getElementById('previewBack').innerHTML='<div class="card">'+backHTML(bk,1)+'<div style="position:absolute;top:50%;left:0;right:0;border-top:1px dashed #fff8;z-index:3"></div>'+backHTML(bk,2)+'</div>'}
}
u()
</script>
</body>
</html>
