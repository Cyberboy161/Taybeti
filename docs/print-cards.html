<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taybeti Notesharing – Passphrase Cards (Print & Cut)</title>
    <style>
        @page {
            size: A4;
            margin: 8mm;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #fff;
            color: #111;
        }

        /* Print grid — 8 cards per A4 (4 columns × 2 rows) */
        .page {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0;
            width: 100%;
            height: 100vh;
        }

        .card {
            position: relative;
            border: 1.5px dashed #999;
            padding: 6px 5px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #fafafa;
            overflow: hidden;
        }

        .card-top {
            text-align: center;
            width: 100%;
        }
        .card-top .logo {
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #222;
            margin-bottom: 2px;
        }
        .card-top .url {
            font-size: 5px;
            color: #555;
            margin-bottom: 3px;
        }

        .qr-area {
            display: flex;
            justify-content: center;
            margin: 2px 0;
        }
        .qr-area canvas, .qr-area img {
            width: 28mm;
            height: 28mm;
        }

        .pass-fields {
            width: 100%;
            display: flex;
            gap: 3px;
            margin-top: 2px;
        }
        .pass-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .pass-field label {
            font-size: 5px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .pass-field .line {
            width: 100%;
            border-bottom: 1px solid #aaa;
            min-height: 10px;
        }

        /* Cut guides */
        .cut-line {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            border-top: 1px dashed #ff6600;
            pointer-events: none;
            z-index: 2;
        }
        .cut-line::before {
            content: "✂ ─── cut here ─── ✂";
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 5px;
            color: #ff6600;
            background: #fafafa;
            padding: 0 6px;
            white-space: nowrap;
        }
        .scissor-icon {
            position: absolute;
            left: 6px;
            top: calc(50% - 6px);
            font-size: 8px;
            color: #ff6600;
        }
        .scissor-icon-right {
            position: absolute;
            right: 6px;
            top: calc(50% - 6px);
            font-size: 8px;
            color: #ff6600;
        }

        .card-footer {
            font-size: 4.5px;
            color: #888;
            text-align: center;
            margin-top: 1px;
        }

        /* Outer dashed cut border between cards */
        .card::after {
            content: '';
            position: absolute;
            inset: -3px;
            border: 1px dotted #ccc;
            pointer-events: none;
            z-index: 1;
        }

        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            color: #fff;
            text-align: center;
            padding: 6px;
            font-size: 12px;
            z-index: 9999;
        }
        .info-bar button {
            background: #4f9cf7;
            color: #fff;
            border: none;
            padding: 6px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin: 0 6px;
        }
        .info-bar button:hover { background: #3b82f6; }

        @media print {
            .info-bar { display: none; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card { page-break-inside: avoid; }
        }

        @media screen and (max-width: 600px) {
            .page {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: auto;
            }
            .info-bar { font-size: 10px; }
        }
    </style>
</head>
<body>

    <div class="page" id="cardGrid"></div>

    <div class="info-bar">
        🖨️ <strong>Print this page</strong> — 8 cards per A4 sheet &nbsp;
        <button onclick="window.print()">🖨️ Print Now</button>
        <button onclick="location.href='index.html'">🏠 Website</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const WEBSITE_URL = "https://cyberboy161.github.io/Taybeti/";
        const CARDS_PER_PAGE = 8;

        function createCard() {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-top">
                    <div class="logo">🔐 Taybeti Notesharing</div>
                    <div class="url">${WEBSITE_URL}</div>
                </div>
                <div class="qr-area"></div>
                <div class="pass-fields">
                    <div class="pass-field">
                        <label>🔑 My Key</label>
                        <div class="line"></div>
                    </div>
                    <div class="pass-field">
                        <label>🔑 Their Key</label>
                        <div class="line"></div>
                    </div>
                </div>
                <div class="cut-line"></div>
                <div class="scissor-icon">✂</div>
                <div class="scissor-icon-right">✂</div>
                <div class="card-footer">Write passphrases, cut, and each keep one half.</div>
            `;
            return card;
        }

        function generateQR(element, url) {
            new QRCode(element, {
                text: url,
                width: 110,
                height: 110,
                colorDark: "#111111",
                colorLight: "#fafafa",
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        // Build all 8 cards
        const grid = document.getElementById('cardGrid');
        for (let i = 0; i < CARDS_PER_PAGE; i++) {
            const card = createCard();
            grid.appendChild(card);
            const qrArea = card.querySelector('.qr-area');
            generateQR(qrArea, WEBSITE_URL);
        }
    </script>
</body>
</html>
