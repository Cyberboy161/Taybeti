<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gre Cards — Builder</title>
<style>
@page{size:A4 portrait;margin:3mm}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#111;color:#eee;overflow-y:auto;min-height:100vh}
#top{position:sticky;top:0;z-index:200;background:#0a0a0a;border-bottom:1px solid #222;padding:6px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px}
#top label{color:#888;font-size:11px}
#top select,#top input{background:#1a1a1a;color:#eee;border:1px solid #333;padding:5px 8px;border-radius:4px;font-size:11px}
#top .g{display:flex;align-items:center;gap:4px;background:#151515;padding:3px 8px;border-radius:5px}
.btn{background:#4f9cf7;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-weight:600;font-size:12px}
.btn.green{background:#2ecc40}
#top a{color:#555;text-decoration:none;font-size:11px}

#main{display:flex;gap:0;min-height:calc(100vh - 52px)}
#panel{width:220px;background:#151515;border-right:1px solid #222;padding:10px;display:flex;flex-direction:column;gap:8px;font-size:11px}
#panel h3{color:#fff;font-size:13px;border-bottom:1px solid #333;padding-bottom:4px}
#panel .elem{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:11px}
#panel .elem:hover{background:#222}
#panel .elem.sel{border-color:#4f9cf7;background:#152030}
#panel .elem .ic{font-size:18px;width:22px;text-align:center}
#panel .elem .lb{flex:1}
#panel .elem .lb .sub{font-size:9px;color:#777}
#panel input[type=text]{width:100%;background:#1a1a1a;color:#eee;border:1px solid #333;padding:4px 8px;border-radius:4px;font-size:10px}

.arr{display:grid;grid-template-columns:30px 30px 30px;grid-template-rows:30px 30px 30px;gap:3px;justify-content:center;margin:4px 0}
.arr button{background:#222;color:#aaa;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.arr button:hover{background:#4f9cf7;color:#fff}
.arr .ac{grid-column:2;grid-row:1}.arr .al{grid-column:1;grid-row:2}.arr .ar{grid-column:3;grid-row:2}
.arr .ad{grid-column:2;grid-row:3}.arr .am{grid-column:2;grid-row:2;font-size:10px}
.szrow{display:flex;gap:3px}.szrow button{flex:1;background:#222;color:#aaa;border:1px solid #333;border-radius:4px;padding:4px;cursor:pointer;font-size:11px}.szrow button:hover{background:#4f9cf7;color:#fff}

#preview{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-y:auto;gap:16px}
#preview h2{color:#fff;font-size:15px;margin:0}
.cw{display:flex;flex-direction:column;align-items:center}
.cd-preview{background:#fff;border:1px solid #555;border-radius:3px;overflow:hidden;position:relative;color:#111;width:240px;height:340px;box-shadow:0 4px 25px rgba(0,0,0,.5)}
.cd-preview .ft{height:100%;display:flex;flex-direction:column;padding:4mm 5mm}
.cd-preview .ft .w{font-size:7.5px;color:#333;text-align:center;line-height:1.3;margin-bottom:2mm}
.cd-preview .ft .l{width:65%;border-bottom:1px solid #444;flex:1;min-height:8mm}
.cd-preview .bk{height:100%;position:relative;background:#111;overflow:hidden}
.cd-preview .bk .bgl{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cd-preview .bk .bgl div{width:100%;height:100%}
.cd-preview .bk .el{position:absolute;z-index:2;pointer-events:none}
.cd-preview .bk .qr-w{background:#fff;border-radius:1mm;padding:1mm;box-shadow:0 0 1.5mm rgba(0,0,0,.5);display:flex}
.cd-preview .bk .qr-w img{display:block;width:100%;height:100%}
.cd-preview .bk .tx{color:#fff;text-shadow:0 0 2px #000;line-height:1.2}

@media print{
 #top,#panel,#preview{display:none!important}
 #main{display:block;height:auto;min-height:0;padding:0}
 body{background:#fff;margin:0;padding:0}
 .print-page{display:grid!important;height:100vh;page-break-after:always}
 .print-page:last-child{page-break-after:auto}
 .print-page .cd-preview{width:auto!important;height:auto!important;min-height:0!important;box-shadow:none!important}
 .print-page .ft{min-height:0!important}
 .print-page .ft .w{font-size:2mm!important}
 .print-page .ft .l{min-height:3mm!important}
 .print-page .bk .qr-w{width:auto!important;height:auto!important}
 @page{size:A4 portrait;margin:3mm}
}
.print-page{display:none}
</style>
</head>
<body>

<div id="top">
    <div class="g"><label>Layout</label><select id="lo" onchange="u()"><option value="2h">2 strips</option><option value="1">1</option><option value="2v">2 vert</option></select></div>
    <div class="g"><label>Design</label><select id="ds" onchange="u()">
        <option value="cyber">Cyber</option><option value="matrix">Matrix</option><option value="red">Red</option><option value="blue">Blue</option><option value="circuit">Circuit</option><option value="fire">Fire</option><option value="ice">Ice</option><option value="neon">Neon</option><option value="dark">Dark</option><option value="gold">Gold</option></select></div>
    <div class="g"><label>Img</label><input type="file" accept="image/*" onchange="upImg(this)"></div>
    <div class="g"><label>QR→</label><select id="qd" onchange="u()"><option value="home">Home</option><option value="invited">Invited</option></select></div>
    <div class="g"><input id="ph" placeholder="Phone" oninput="u()" style="width:70px"><input id="em" placeholder="Email" oninput="u()" style="width:70px"></div>
    <div class="g"><input id="cq" placeholder="Custom QR URL" oninput="u()" style="width:120px"></div>
    <div class="g"><label><input type="checkbox" id="showUrl" checked onchange="u()" style="width:auto">Show URL</label></div>
    <button class="btn" onclick="window.print()">🖨️ Print</button>
    <a href="index.html">🏠</a>
</div>

<div id="main">
    <div id="panel">
        <h3>Select Element</h3>
        <div class="elem sel" data-el="qr" onclick="sel('qr')"><span class="ic">▣</span><div class="lb">Website QR<div class="sub">Move + resize</div></div></div>
        <div class="elem" data-el="qr2" onclick="sel('qr2')"><span class="ic">▣</span><div class="lb">Custom QR<div class="sub">Instagram etc</div></div></div>
        <div class="elem" data-el="url" onclick="sel('url')"><span class="ic">🔗</span><div class="lb">URL Text<div class="sub">A−/A+ for font</div></div></div>
        <div class="elem" data-el="contact" onclick="sel('contact')"><span class="ic">📋</span><div class="lb">Contact Info<div class="sub">Phone & email</div></div></div>
        <div class="elem" data-el="custom" onclick="sel('custom')"><span class="ic">✏️</span><div class="lb">Custom Text<div class="sub">Type below</div></div></div>
        <div class="elem" data-el="bg" onclick="sel('bg')"><span class="ic">🖼️</span><div class="lb">Background<div class="sub">Zoom + rotate</div></div></div>
        <div class="elem" data-el="ftxt" onclick="sel('ftxt')"><span class="ic">📝</span><div class="lb">Front Text<div class="sub">Move warning</div></div></div>
        <div class="elem" data-el="fline" onclick="sel('fline')"><span class="ic">📏</span><div class="lb">Write Line<div class="sub">Move the line</div></div></div>

        <input type="text" id="custTxt" placeholder="Type your custom text here" oninput="u()">

        <div class="arr">
            <button class="ac" onclick="mv(0,-1)">▲</button>
            <button class="al" onclick="mv(-1,0)">◀</button>
            <button class="am" onclick="resetEl()" title="Reset">↺</button>
            <button class="ar" onclick="mv(1,0)">▶</button>
            <button class="ad" onclick="mv(0,1)">▼</button>
        </div>
        <div class="szrow">
            <button onclick="sizeEl(-1)">A−</button>
            <button onclick="sizeEl(1)">A+</button>
        </div>
        <div style="display:flex;gap:3px">
            <button class="btn" style="font-size:10px;padding:3px 6px;flex:1" onclick="rotateBg(-90)">↺90°</button>
            <button class="btn" style="font-size:10px;padding:3px 6px;flex:1" onclick="rotateBg(90)">90°↻</button>
        </div>
        <div class="szrow">
            <button onclick="zoomBg(-10)">◉−</button>
            <button onclick="zoomBg(10)">◉+</button>
        </div>
        <button class="btn green" onclick="window.print()">✅ Ready — Print</button>
    </div>

    <div id="preview">
        <h2>📝 Front</h2><div class="cw" id="pf"></div>
        <h2>🖼️ Back</h2><div class="cw" id="pb"></div>
    </div>
</div>

<div class="print-page" id="printFrontPage"></div>
<div class="print-page" id="printBackPage"></div>

<script>
var IMG="https://cyberboy161.github.io/Taybeti/card-bg.png";var uploaded='';var selEl='qr';
var el={qr:{x:30,y:30,w:40,h:40},qr2:{x:60,y:30,w:40,h:40},url:{x:50,y:3,w:7,h:0},contact:{x:50,y:88,w:6,h:0},custom:{x:50,y:50,w:8,h:0},bg:{x:0,y:0,w:100,h:100,rot:0},ftxt:{x:50,y:10,w:0,h:0},fline:{x:50,y:70,w:0,h:0}};

function SITE(){return document.getElementById('qd').value=='home'?'https://cyberboy161.github.io/Taybeti/index.html':'https://cyberboy161.github.io/Taybeti/invited.html'}
function showU(){return document.getElementById('showUrl').checked}
function QRU(u){return"https://api.qrserver.com/v1/create-qr-code/?size=80x80&data="+encodeURIComponent(u||SITE())}

function upImg(i){if(i.files&&i.files[0]){var r=new FileReader();r.onload=function(e){uploaded=e.target.result;u()};r.readAsDataURL(i.files[0])}}
function sel(e){selEl=e;document.querySelectorAll('#panel .elem').forEach(function(x){x.classList.toggle('sel',x.dataset.el===e)})}
function mv(dx,dy){var p=el[selEl];if(!p)return;p.x=Math.max(0,Math.min(92,(p.x||0)+dx*3));p.y=Math.max(0,Math.min(92,(p.y||0)+dy*3));u()}
function resetEl(){var p=el[selEl];if(!p)return;var d={qr:[30,30],qr2:[60,30],url:[50,3],contact:[50,88],custom:[50,50],ftxt:[50,10],fline:[50,70]};var df=d[selEl]||[50,50];p.x=df[0];p.y=df[1];u()}
function sizeEl(d){var p=el[selEl];if(!p||selEl=='bg')return;if(selEl=='url'||selEl=='contact'||selEl=='custom'){p.w=Math.max(3,Math.min(24,(p.w||6)+d));u()}else if(selEl=='fline'){p.w=Math.max(10,Math.min(90,(p.w||65)+d*3));u()}else{p.w=Math.max(8,Math.min(60,(p.w||15)+d*4));p.h=p.w;u()}}
function rotateBg(d){el.bg.rot=(el.bg.rot||0)+d;u()}
function zoomBg(d){el.bg.w=Math.max(30,Math.min(200,(el.bg.w||100)+d));el.bg.h=el.bg.w;u()}

function bgStyle(k){
    var m={matrix:'#000;background-image:linear-gradient(rgba(0,255,0,.08)1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.08)1px,transparent 1px);background-size:3px 3px',
    red:'linear-gradient(135deg,#1a0000,#2d0000,#1a0000)',blue:'radial-gradient(ellipse at center,#0a1628,#020810)',
    circuit:'#0a0f0a;background-image:linear-gradient(rgba(0,200,0,.06)1px,transparent 1px),linear-gradient(90deg,rgba(0,200,0,.06)1px,transparent 1px),radial-gradient(circle,rgba(0,200,0,.1)1px,transparent 1px);background-size:6px 6px,6px 6px,12px 12px;background-position:0 0,0 0,3px 3px',
    fire:'linear-gradient(180deg,#1a0500,#331100,#1a0500,#330000)',ice:'linear-gradient(180deg,#001122,#003355,#001122)',
    neon:'#0d0d0d;background-image:linear-gradient(rgba(255,0,128,.05)2px,transparent 2px),linear-gradient(90deg,rgba(0,255,255,.05)2px,transparent 2px);background-size:6mm 6mm,6mm 6mm',
    dark:'linear-gradient(135deg,#0d1117,#161b22,#0d1117)',gold:'linear-gradient(160deg,#1a1a0a,#2a2010,#1a1a0a)'};
    return uploaded?'url('+uploaded+') center/cover':(k=='cyber'?'url('+IMG+') center/cover':m[k]||m.dark)
}

function ft(forPrint){
    var cls=forPrint?'ft':'ft';
    var p=el.ftxt,pl=el.fline;
    return'<div class="'+cls+'">'+
        '<div class="w" style="position:relative;left:'+(p.x-50)+'%;top:'+((p.y-10)*0.5)+'%">وێنەی مەگرە. بە کەس مەڵێ. بە دەنگی بەرز مەیخوێنەرەوە.<br>Do not photograph. Do not share.<br>Nicht fotografieren. Nicht teilen.</div>'+
        '<div class="l" style="position:relative;left:'+(pl.x-50)+'%;top:'+((pl.y-70)*0.5)+'%;width:'+(pl.w||65)+'%"></div>'+
        '</div>';
}

function backHalf(bgKey){
    var ph=document.getElementById('ph').value.trim(),em=document.getElementById('em').value.trim();
    var cq=document.getElementById('cq').value.trim(),ct=document.getElementById('custTxt').value.trim();
    var bgStyle=uploaded?'url('+uploaded+') center/cover':(bgKey=='cyber'?'url('+IMG+') center/cover':'');
    var bgHtml='';
    if(bgStyle){
        bgHtml='<img class="bgl" src="'+(uploaded||IMG)+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:rotate('+el.bg.rot+'deg) scale('+(el.bg.w/100)+')">';
    } else {
        var cssBg={matrix:'#000',red:'linear-gradient(135deg,#1a0000,#2d0000,#1a0000)',blue:'radial-gradient(ellipse at center,#0a1628,#020810)',
        circuit:'#0a0f0a',fire:'linear-gradient(180deg,#1a0500,#331100,#1a0500,#330000)',ice:'linear-gradient(180deg,#001122,#003355,#001122)',
        neon:'#0d0d0d',dark:'linear-gradient(135deg,#0d1117,#161b22,#0d1117)',gold:'linear-gradient(160deg,#1a1a0a,#2a2010,#1a1a0a)'}[bgKey]||'#111';
        bgHtml='<div class="bgl" style="transform:rotate('+el.bg.rot+'deg) scale('+(el.bg.w/100)+')"><div style="background:'+cssBg+';width:100%;height:100%"></div></div>';
    }
    var qr1='<div class="el" style="left:'+el.qr.x+'%;top:'+el.qr.y+'%"><div class="qr-w" style="width:'+el.qr.w+'px;height:'+el.qr.h+'px"><img src="'+QRU()+'" style="width:100%;height:100%"></div></div>';
    var qr2=cq?'<div class="el" style="left:'+el.qr2.x+'%;top:'+el.qr2.y+'%"><div class="qr-w" style="width:'+el.qr2.w+'px;height:'+el.qr2.h+'px"><img src="'+QRU(cq)+'" style="width:100%;height:100%"></div></div>':'';
    var ux=showU()?'<div class="el tx" style="left:'+el.url.x+'%;top:'+el.url.y+'%;font-size:'+el.url.w+'px">'+SITE()+'</div>':'';
    var ci='';
    if(ph||em)ci='<div class="el tx" style="left:'+el.contact.x+'%;top:'+el.contact.y+'%;font-size:'+el.contact.w+'px">'+(ph?'📞'+ph:'')+(ph&&em?' · ':'')+(em?'📧'+em:'')+'</div>';
    var cx=ct?'<div class="el tx" style="left:'+el.custom.x+'%;top:'+el.custom.y+'%;font-size:'+el.custom.w+'px">'+ct+'</div>':'';
    return'<div class="bk">'+bgHtml+qr1+qr2+ux+ci+cx+'</div>';
}

function makeFrontCard(lo){
    if(lo=='2v')return'<div class="cd-preview" style="display:flex;flex-direction:row"><div class="ft" style="border-right:1.5px dashed #000">'+ft(true)+'</div><div class="ft">'+ft(true)+'</div></div>';
    if(lo=='1')return'<div class="cd-preview"><div class="ft">'+ft(true)+'</div></div>';
    return'<div class="cd-preview"><div class="ft" style="border-bottom:1.5px dashed #000">'+ft(true)+'</div><div class="ft">'+ft(true)+'</div></div>';
}
function makeBackCard(lo,bg){
    if(lo=='2v')return'<div class="cd-preview" style="display:flex;flex-direction:row"><div style="flex:1;position:relative;border-right:1px dashed #fff8">'+backHalf(bg)+'</div><div style="flex:1;position:relative">'+backHalf(bg)+'</div></div>';
    if(lo=='1')return'<div class="cd-preview">'+backHalf(bg)+'</div>';
    return'<div class="cd-preview"><div style="position:relative;height:50%;border-bottom:1px dashed #fff8">'+backHalf(bg)+'</div><div style="position:relative;height:50%">'+backHalf(bg)+'</div></div>';
}

function u(){
    var lo=document.getElementById('lo').value,bg=document.getElementById('ds').value;
    document.getElementById('pf').innerHTML=makeFrontCard(lo);
    document.getElementById('pb').innerHTML=makeBackCard(lo,bg);
    // Generate print pages
    var cols=4,rows=2;if(lo=='2v'||lo=='2'){cols=4;rows=6}
    var total=cols*rows;
    var pfHtml='',pbHtml='';
    for(var i=0;i<total;i++){pfHtml+=makeFrontCard(lo);pbHtml+=makeBackCard(lo,bg)}
    document.getElementById('printFrontPage').innerHTML=pfHtml;
    document.getElementById('printBackPage').innerHTML=pbHtml;
    document.getElementById('printFrontPage').style.cssText='grid-template-columns:repeat('+cols+',1fr);grid-template-rows:repeat('+rows+',1fr);gap:2mm;max-width:204mm;margin:0 auto;width:100%';
    document.getElementById('printBackPage').style.cssText='grid-template-columns:repeat('+cols+',1fr);grid-template-rows:repeat('+rows+',1fr);gap:2mm;max-width:204mm;margin:0 auto;width:100%';
}
u()
</script>
</body>
</html>
