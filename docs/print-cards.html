<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taybeti Notesharing – Passphrase Cards</title>
    <style>
        @page { size: A4; margin: 5mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #f5f5f0; color: #111; }
        h2 { text-align: center; font-size: 13px; margin: 8px 0 4px; color: #999; font-weight: 400; }
        .page {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 3mm;
            width: 100%;
            min-height: 95vh;
        }
        .card {
            position: relative;
            overflow: hidden;
        }

        /* ── FRONT ── */
        .front .card {
            border: 1px solid #999;
            background: #fff;
        }
        .front .card-inner {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .front .half {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 6px 10px 8px;
            position: relative;
        }
        .front .half-top { border-bottom: 1.5px dashed #000; }
        .front .write-line {
            width: 80%;
            border-bottom: 1px solid #666;
            min-height: 13px;
        }
        .front .scissor-l {
            position: absolute; left: -5px; top: calc(50% - 6px);
            font-size: 10px; color: #555; z-index: 3;
        }
        .front .scissor-r {
            position: absolute; right: -5px; top: calc(50% - 6px);
            font-size: 10px; color: #555; z-index: 3;
        }

        /* ── BACK ── */
        .back .card {
            border: 1px solid #bbb;
            background: #111;
            display: flex;
            flex-direction: column;
        }
        .back .half {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 2mm;
        }
        .back .half-top { border-bottom: 1.5px dashed #fff8; }
        .back .bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .back .qr-box {
            position: relative;
            z-index: 1;
            width: 18mm;
            height: 18mm;
            background: #fff;
            border-radius: 1.2mm;
            padding: 1.2mm;
            box-shadow: 0 0 2mm rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back .qr-box img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .back .scissor-l {
            position: absolute; left: 2px; top: calc(50% - 6px);
            font-size: 9px; color: #fff; z-index: 3;
        }
        .back .scissor-r {
            position: absolute; right: 2px; top: calc(50% - 6px);
            font-size: 9px; color: #fff; z-index: 3;
        }

        /* ── Buttons bar ── */
        .action-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111;
            color: #fff; text-align: center; padding: 7px; font-size: 12px; z-index: 9999;
        }
        .action-bar button {
            background: #444; color: #fff; border: none; padding: 6px 18px;
            border-radius: 6px; cursor: pointer; font-size: 13px; margin: 0 4px;
        }
        .action-bar button.primary { background: #4f9cf7; font-weight: 600; }

        @media print {
            .action-bar { display: none; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card { page-break-inside: avoid; }
        }
        @media screen and (max-width: 600px) {
            .page { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
        }
    </style>
</head>
<body>

    <h2>📝 Page 1 — Front</h2>
    <div class="page" id="pageFront"></div>
    <hr style="border:1px dashed #ccc;margin:16px 0;page-break-after:always;">
    <h2>🖼️ Page 2 — Back</h2>
    <div class="page" id="pageBack"></div>

    <div class="action-bar">
        🖨️ Print duplex or Save as PDF &nbsp;
        <button class="primary" onclick="window.print()">🖨️ Print / PDF</button>
    </div>

<script>
var URL = "https://cyberboy161.github.io/Taybeti/";
function qrImg(s){return"https://api.qrserver.com/v1/create-qr-code/?size="+s+"x"+s+"&data="+encodeURIComponent(URL);}

function frontCard(){
    var c=document.createElement('div');c.className='card front';
    c.innerHTML='<div class="card-inner"><div class="half half-top"><div class="write-line"></div></div><div class="half"><div class="write-line"></div></div><span class="scissor-l">✂</span><span class="scissor-r">✂</span></div>';
    return c;
}

function halfHTML(){
    return '<div class="half">' +
        '<img class="bg-img" src="card-bg.png" alt="">' +
        '<div class="qr-box"><img src="'+qrImg(76)+'" alt="QR"></div>' +
        '</div>';
}

function backCard(){
    var c=document.createElement('div');c.className='card back';
    // Each half gets its own background image and QR code
    var h1 = '<div class="half half-top">' +
        '<img class="bg-img" src="card-bg.png" alt="">' +
        '<div class="qr-box"><img src="'+qrImg(76)+'" alt="QR"></div>' +
        '</div>';
    var h2 = '<div class="half">' +
        '<img class="bg-img" src="card-bg.png" alt="">' +
        '<div class="qr-box"><img src="'+qrImg(76)+'" alt="QR"></div>' +
        '</div>';
    c.innerHTML = h1 + h2 +
        '<span class="scissor-l">✂</span>' +
        '<span class="scissor-r">✂</span>';
    return c;
}

var pf=document.getElementById('pageFront'),pb=document.getElementById('pageBack');
for(var i=0;i<8;i++){pf.appendChild(frontCard());pb.appendChild(backCard());}
</script>
</body>
</html>
