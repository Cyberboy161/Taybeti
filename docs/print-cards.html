<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taybeti Notesharing – Passphrase Cards (Print Duplex)</title>
    <style>
        @page { size: A4; margin: 5mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', Courier, monospace; background: #fff; color: #111; }

        .page {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2.5mm;
            width: 100%;
            min-height: 100vh;
        }

        .card {
            position: relative;
            border: 1.5px solid #bbb;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* ── FRONT SIDE ── */
        .front .half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 6px;
            gap: 2px;
        }
        .front .half-top {
            border-bottom: 2px dashed #ff6600;
        }
        .front .person-label {
            font-size: 7px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .front .write-line {
            width: 85%;
            border-bottom: 1px solid #999;
            min-height: 11px;
        }

        /* ── BACK SIDE ── */
        .back .half {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back .half-top {
            border-bottom: 2px dashed #ff6600;
        }
        .back .qr-wrap { width: 22mm; height: 22mm; }
        .back .qr-wrap img { width: 100%; height: 100%; display: block; }

        /* ── Cut indicators on sides ── */
        .scissor-l {
            position: absolute; left: -4px; top: calc(50% - 6px);
            font-size: 10px; color: #ff6600; z-index: 3;
        }
        .scissor-r {
            position: absolute; right: -4px; top: calc(50% - 6px);
            font-size: 10px; color: #ff6600; z-index: 3;
        }

        /* ── Info bar ── */
        .info-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111;
            color: #fff; text-align: center; padding: 6px; font-size: 12px; z-index: 9999;
        }
        .info-bar button {
            background: #ff6600; color: #fff; border: none; padding: 6px 18px;
            border-radius: 6px; cursor: pointer; font-size: 13px; margin: 0 6px;
        }

        @media print {
            .info-bar { display: none; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card { page-break-inside: avoid; }
        }
        @media screen and (max-width: 600px) {
            .page { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
        }

        /* Tab bar to switch between front/back view */
        .tab-bar {
            text-align: center; margin-bottom: 8px;
        }
        .tab-bar button {
            background: #eee; border: 1px solid #ccc; padding: 6px 16px;
            margin: 0 4px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .tab-bar button.active { background: #ff6600; color: #fff; border-color: #ff6600; }
    </style>
</head>
<body>
    <div class="tab-bar" id="tabBar" style="display:none">
        <button id="tabFront" class="active" onclick="showPage('front')">📝 Front (Passphrases)</button>
        <button id="tabBack" onclick="showPage('back')">📱 Back (QR Codes)</button>
        <button onclick="window.print()" style="background:#ff6600;color:#fff;border-color:#ff6600;">🖨️ Print Both</button>
    </div>

    <div class="page" id="pageFront"></div>
    <div class="page" id="pageBack"></div>

    <div class="info-bar">
        🖨️ Print duplex: first page = passphrases, second page = QR codes (on back) &nbsp;
        <button onclick="window.print()">🖨️ Print Now</button>
        <button onclick="showPage('front')">📝 Front</button>
        <button onclick="showPage('back')">📱 Back</button>
    </div>

<script>
var URL = "https://cyberboy161.github.io/Taybeti/";
function qrImg(size) {
    return "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size + "&data=" + encodeURIComponent(URL);
}

function frontCard() {
    var card = document.createElement('div');
    card.className = 'card front';
    card.innerHTML =
        '<div class="half half-top">' +
            '<span class="person-label">👤 Person 1</span>' +
            '<div class="write-line"></div>' +
        '</div>' +
        '<div class="half">' +
            '<span class="person-label">👤 Person 2</span>' +
            '<div class="write-line"></div>' +
        '</div>' +
        '<span class="scissor-l">✂</span>' +
        '<span class="scissor-r">✂</span>';
    return card;
}

function backCard() {
    var card = document.createElement('div');
    card.className = 'card back';
    card.innerHTML =
        '<div class="half half-top">' +
            '<div class="qr-wrap"><img src="' + qrImg(90) + '" alt="QR"></div>' +
        '</div>' +
        '<div class="half">' +
            '<div class="qr-wrap"><img src="' + qrImg(90) + '" alt="QR"></div>' +
        '</div>' +
        '<span class="scissor-l">✂</span>' +
        '<span class="scissor-r">✂</span>';
    return card;
}

var pf = document.getElementById('pageFront');
var pb = document.getElementById('pageBack');
for (var i = 0; i < 8; i++) {
    pf.appendChild(frontCard());
    pb.appendChild(backCard());
}

function showPage(side) {
    pf.style.display = (side === 'front') ? 'grid' : 'none';
    pb.style.display = (side === 'back') ? 'grid' : 'none';
    document.getElementById('tabFront').classList.toggle('active', side === 'front');
    document.getElementById('tabBack').classList.toggle('active', side === 'back');
}
showPage('front');
</script>
</body>
</html>
