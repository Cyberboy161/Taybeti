<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taybeti Notesharing – Passphrase Cards</title>
    <style>
        @page { size: A4; margin: 5mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', Courier, monospace; background: #fff; color: #111; }
        .page {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2mm;
            width: 100%;
            min-height: 100vh;
        }
        .card {
            position: relative;
            border: 1.5px dashed #999;
            display: flex;
            flex-direction: column;
            background: #fdfdfd;
            padding: 4px;
        }
        .half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3px 2px;
            position: relative;
        }
        .half-top { border-bottom: 2px dashed #ff6600; }
        .half-label {
            font-size: 6px;
            font-weight: 700;
            color: #ff6600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .qr-wrap { width: 22mm; height: 22mm; margin: 2px 0; }
        .qr-wrap img { width: 100%; height: 100%; display: block; }
        .field { width: 100%; text-align: center; }
        .field label {
            font-size: 5.5px; font-weight: 600; color: #333;
            display: block; margin-bottom: 1px;
        }
        .field .write-line {
            width: 100%; border-bottom: 1px solid #888; min-height: 9px; margin-bottom: 1px;
        }
        .cut-label {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            font-size: 5px; font-weight: 700; color: #fff; background: #ff6600;
            padding: 1px 6px; border-radius: 2px; white-space: nowrap; z-index: 3;
        }
        .scissor-l {
            position: absolute; left: 3px; top: calc(50% - 7px);
            font-size: 10px; color: #ff6600; z-index: 3;
        }
        .scissor-r {
            position: absolute; right: 3px; top: calc(50% - 7px);
            font-size: 10px; color: #ff6600; z-index: 3;
        }
        .info-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111;
            color: #fff; text-align: center; padding: 6px; font-size: 12px; z-index: 9999;
        }
        .info-bar button {
            background: #ff6600; color: #fff; border: none; padding: 6px 18px;
            border-radius: 6px; cursor: pointer; font-size: 13px; margin: 0 6px;
        }
        @media print {
            .info-bar { display: none; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card { page-break-inside: avoid; }
        }
        @media screen and (max-width: 600px) {
            .page { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
        }
    </style>
</head>
<body>
    <div class="page" id="cardGrid"></div>
    <div class="info-bar">
        🖨️ <strong>Print this page</strong> &mdash; cut cards on the orange line, each person keeps their half &nbsp;
        <button onclick="window.print()">🖨️ Print Now</button>
        <button onclick="location.href='index.html'">🏠 Website</button>
    </div>
<script>
var URL = "https://cyberboy161.github.io/Taybeti/";

// QR code image URL (reliable, no JS library needed)
function qrImg(size) {
    return "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size + "&data=" + encodeURIComponent(URL);
}

function createCard() {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
        // --- Top half: Person 1 ---
        '<div class="half half-top">' +
            '<div class="half-label">👤 Person 1</div>' +
            '<div class="qr-wrap"><img src="' + qrImg(90) + '" alt="QR"></div>' +
            '<div class="field">' +
                '<label>🔑 Your Passphrase</label>' +
                '<div class="write-line"></div>' +
            '</div>' +
        '</div>' +
        // --- Bottom half: Person 2 ---
        '<div class="half">' +
            '<div class="half-label">👤 Person 2</div>' +
            '<div class="qr-wrap"><img src="' + qrImg(90) + '" alt="QR"></div>' +
            '<div class="field">' +
                '<label>🔑 Your Passphrase</label>' +
                '<div class="write-line"></div>' +
            '</div>' +
        '</div>' +
        // --- Cut indicators ---
        '<span class="cut-label">✂ cut</span>' +
        '<span class="scissor-l">✂</span>' +
        '<span class="scissor-r">✂</span>';
    return card;
}

var grid = document.getElementById('cardGrid');
for (var i = 0; i < 8; i++) {
    grid.appendChild(createCard());
}
</script>
</body>
</html>
