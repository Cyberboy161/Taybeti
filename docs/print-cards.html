<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taybeti Notesharing – Passphrase Cards (Print & Cut)</title>
    <style>
        @page { size: A4; margin: 6mm; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #fff;
            color: #111;
        }
        .page {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0;
            width: 100%;
            height: 100vh;
        }
        .card {
            position: relative;
            border: 2px dashed #bbb;
            padding: 8px 6px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fdfdfd;
        }
        .card-top { text-align: center; width: 100%; margin-bottom: 3px; }
        .card-top .logo { font-size: 7px; font-weight: 700; color: #111; letter-spacing: 0.3px; margin-bottom: 1px; }
        .card-top .url { font-size: 5.5px; color: #666; }
        .qr-area {
            display: flex; justify-content: center; align-items: center;
            width: 30mm; height: 30mm; margin: 3px 0;
        }
        .qr-area canvas { width: 100%; height: 100%; }
        .pass-section { width: 100%; text-align: center; margin-top: 2px; }
        .pass-section label {
            font-size: 6px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: #222;
        }
        .pass-section .line {
            width: 100%; border-bottom: 1.5px solid #666; min-height: 14px; margin: 2px 0;
        }
        .cut-divider {
            position: absolute; left: 0; right: 0; top: 50%; height: 0;
            border-top: 2px solid #ff6600; z-index: 2; pointer-events: none;
        }
        .cut-label {
            position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
            font-size: 5.5px; font-weight: 700; color: #fff; background: #ff6600;
            padding: 2px 8px; border-radius: 3px; white-space: nowrap; z-index: 3;
        }
        .card-footer { font-size: 4.5px; color: #999; text-align: center; margin-top: 3px; }
        .info-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111;
            color: #fff; text-align: center; padding: 6px; font-size: 12px; z-index: 9999;
        }
        .info-bar button {
            background: #ff6600; color: #fff; border: none; padding: 6px 18px;
            border-radius: 6px; cursor: pointer; font-size: 13px; margin: 0 6px;
        }
        .info-bar button:hover { background: #e55a00; }
        @media print {
            .info-bar { display: none; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .card { page-break-inside: avoid; }
        }
        @media screen and (max-width: 600px) {
            .page { grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
        }
    </style>
</head>
<body>
    <div class="page" id="cardGrid"></div>
    <div class="info-bar">
        🖨️ <strong>Print this page</strong> &mdash; 8 cards per A4 &nbsp;
        <button onclick="window.print()">🖨️ Print Now</button>
        <button onclick="location.href='index.html'">🏠 Website</button>
    </div>

// ---- Build cards ----
var URL = "https://cyberboy161.github.io/Taybeti/";

function drawQR(canvas, url) {
    var qr = new QRCode(-1, 1); // type -1 = auto, error level L
    qr.addData(url);
    qr.make();
    var size = qr.getModuleCount();
    var ctx = canvas.getContext('2d');
    var cell = canvas.width / size;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#111';
    for (var r = 0; r < size; r++) {
        for (var c = 0; c < size; c++) {
            if (qr.isDark(r, c)) {
                ctx.fillRect(c * cell, r * cell, cell, cell);
            }
        }
    }
}

function createCard() {
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
        '<div class="card-top">' +
            '<div class="logo">🔐 Taybeti Notesharing</div>' +
            '<div class="url">' + URL + '</div>' +
        '</div>' +
        '<div class="qr-area">' +
            '<canvas width="120" height="120"></canvas>' +
        '</div>' +
        '<div class="pass-section">' +
            '<label>🔑 Passphrase (both write the SAME key)</label>' +
            '<div class="line"></div>' +
        '</div>' +
        '<div class="cut-divider">' +
            '<span class="cut-label">✂ ─── cut here &amp; split ─── ✂</span>' +
        '</div>' +
        '<div style="position:absolute;left:4px;top:calc(50% - 8px);font-size:12px;color:#ff6600;">✂</div>' +
        '<div style="position:absolute;right:4px;top:calc(50% - 8px);font-size:12px;color:#ff6600;">✂</div>' +
        '<div class="card-footer">Write passphrase, cut on orange line, each keep half.</div>';
    return card;
}
