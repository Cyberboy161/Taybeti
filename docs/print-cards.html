<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taybeti – Build Your Passphrase Cards</title>
    <style>
        @page { size: A4 portrait; margin: 3mm; }
        * { margin:0; padding:0; box-sizing:border-box }
        body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f0;padding:0;}

        /* Layout */
        #controls{position:fixed;top:0;left:0;width:260px;height:100vh;background:#111;overflow-y:auto;padding:16px;z-index:100;color:#ccc;font-size:13px;display:none;flex-direction:column;gap:10px}
        #controls h3{color:#fff;font-size:15px;margin-bottom:4px;border-bottom:1px solid #333;padding-bottom:6px}
        #controls label{display:block;color:#999;font-size:12px;margin-bottom:2px}
        #controls select,#controls input[type=file],#controls input[type=range]{width:100%;background:#222;color:#fff;border:1px solid #444;padding:6px 10px;border-radius:6px;font-size:12px;margin-bottom:6px}
        #controls select{cursor:pointer}
        #controls input[type=file]{color:#999;padding:4px}
        .ctrl-group{background:#1a1a1a;border-radius:8px;padding:10px;margin-bottom:4px}
        .ctrl-group .row{display:flex;gap:6px;margin-top:4px}
        .ctrl-group .row button{flex:1;background:#222;color:#ccc;border:1px solid #444;border-radius:5px;padding:5px;font-size:11px;cursor:pointer}
        .ctrl-group .row button.active{background:#4f9cf7;border-color:#4f9cf7;color:#fff}
        .ctrl-btn{background:#4f9cf7;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;font-weight:600;width:100%;margin-top:4px}
        #menuToggle{position:fixed;top:8px;left:8px;z-index:200;background:#111;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px}

        /* Cards */
        .page-wrap{padding:60px 20px 40px;max-width:1200px;margin:0 auto}
        .page{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr 1fr;gap:3mm;width:210mm;margin:0 auto;min-height:285mm}
        .card{position:relative;border:1px solid #999;display:flex;background:#fff;overflow:hidden}
        .card.vert{flex-direction:row!important}

        .front{flex-direction:column;flex:1}
        .front .part{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2mm 2mm}
        .front .part+.part{border-top:1.5px dashed #000}
        .front .warn{width:100%;font-size:6.5px;line-height:1.3;color:#333;text-align:center;margin-bottom:1px}
        .front .write-line{width:80%;border-bottom:1px solid #444;min-height:8mm}

        .back{flex-direction:column;flex:1;background:#111;position:relative}
        .back .part{flex:1;display:flex;align-items:center;position:relative;overflow:hidden;padding:2mm}
        .back .part+.part{border-top:1px dashed #fff8}
        .back .bg-layer{position:absolute;inset:0}
        .back .qr-layer{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
        .back .qr-wrap{background:#fff;border-radius:1mm;padding:1mm;box-shadow:0 0 2mm rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}

        @media print{#controls,#menuToggle{display:none!important}.page-wrap{padding:8px 0}}
    </style>
</head>
<body>
<button id="menuToggle" onclick="togglePanel()">⚙️ Customize</button>

<div id="controls">
    <div class="ctrl-group">
        <h3>Layout</h3>
        <label>Split type</label>
        <select id="splitType" onchange="build()">
            <option value="2">2 horizontal strips</option>
            <option value="1">1 (no split)</option>
            <option value="2v">2 vertical halves</option>
        </select>
    </div>

    <div class="ctrl-group">
        <h3>QR Code — Website</h3>
        <label>Destination</label>
        <select id="qrDest" onchange="build()">
            <option value="home">🏠 Homepage</option>
            <option value="invited">📩 Invited page</option>
        </select>
        <label>Position</label>
        <div class="row" id="qrPosRow">
            <button data-pos="left" onclick="setQRPos('left');build()">←</button>
            <button data-pos="center" onclick="setQRPos('center');build()" class="active">↕</button>
            <button data-pos="right" onclick="setQRPos('right');build()">→</button>
        </div>
        <label style="margin-top:6px;display:flex;align-items:center;gap:6px"><input type="checkbox" id="showUrl" checked onchange="build()"> Show website URL on back</label>
    </div>

    <div class="ctrl-group">
        <h3>Your Contacts (optional)</h3>
        <label>Phone number</label>
        <input type="text" id="contactPhone" oninput="build()" placeholder="+1 234 567 890">
        <label>Email</label>
        <input type="text" id="contactEmail" oninput="build()" placeholder="name@example.com">
        <label>Custom text</label>
        <input type="text" id="contactText" oninput="build()" placeholder="Your name / organization">
        <label>Your own QR (link or upload)</label>
        <input type="text" id="customQrUrl" oninput="build()" placeholder="https://... or leave empty">
        <input type="file" id="customQrImg" accept="image/*" onchange="handleCustomQr(this)">
    </div>

    <div class="ctrl-group">
        <h3>Background</h3>
        <label>Design</label>
        <select id="bgSelect" onchange="build()">
            <option value="cyber">Cybersecurity</option>
            <option value="matrix">💚 Matrix</option>
            <option value="red">🔴 Red</option>
            <option value="blue">🔵 Deep Blue</option>
            <option value="circuit">🔌 Circuit</option>
            <option value="fire">🔥 Fire</option>
            <option value="ice">❄️ Ice</option>
            <option value="neon">💜 Neon</option>
            <option value="dark">⬛ Minimal</option>
            <option value="gold">🟡 Gold</option>
        </select>
        <label>Or upload your own</label>
        <input type="file" id="bgUpload" accept="image/*" onchange="handleBgUpload(this)">
    </div>

    <div class="ctrl-group">
        <h3>Front Text Size</h3>
        <input type="range" id="fontSize" min="5" max="14" value="8" step="0.5" onchange="build()">
    </div>

    <button class="ctrl-btn" onclick="window.print()">🖨️ Print / PDF</button>
    <a href="index.html" style="color:#666;text-align:center;display:block;margin-top:6px;text-decoration:none;font-size:11px">🏠 Home</a>
</div>

<div class="page-wrap">
    <h2 id="frontTitle" style="text-align:center;font-size:12px;color:#999;font-weight:400;margin:0 0 4px">📝 Front</h2>
    <div class="page" id="pageFront"></div>
    <hr style="border:1px dashed #ccc;margin:12px 0;page-break-after:always;">
    <h2 id="backTitle" style="text-align:center;font-size:12px;color:#999;font-weight:400;margin:4px 0">🖼️ Back</h2>
    <div class="page" id="pageBack"></div>
</div>

<script>
var panelOpen = true;
function togglePanel(){ document.getElementById('controls').style.display = panelOpen ? 'none' : 'flex'; panelOpen = !panelOpen; }
togglePanel();

var uploadedBg = null, customQrData = null;
var desiredQRPos = 'center';

function setQRPos(p){
    desiredQRPos = p;
    document.querySelectorAll('#qrPosRow button').forEach(function(b){b.classList.remove('active')});
    document.querySelector('#qrPosRow button[data-pos="'+p+'"]').classList.add('active');
}

function handleBgUpload(input){
    if(input.files && input.files[0]){ var r = new FileReader();
    r.onload = function(e){ uploadedBg = e.target.result; build(); };
    r.readAsDataURL(input.files[0]); }
}
function handleCustomQr(input){
    if(input.files && input.files[0]){ var r = new FileReader();
    r.onload = function(e){ customQrData = e.target.result; build(); };
    r.readAsDataURL(input.files[0]); }
}

function Q(s){ return "https://api.qrserver.com/v1/create-qr-code/?size="+s+"x"+s+"&data="+encodeURIComponent(getQRUrl()); }
function getQRUrl(){ return document.getElementById('qrDest').value === 'home' ? "https://cyberboy161.github.io/Taybeti/index.html" : "https://cyberboy161.github.io/Taybeti/invited.html"; }

function bgStyle(key){
    var m = {
        cyber:'background:linear-gradient(135deg,#0a1628,#1a2a44,#0a1628)',
        matrix:'background:#000;background-image:linear-gradient(rgba(0,255,0,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,0,.08) 1px,transparent 1px);background-size:3px 3px',
        red:'background:linear-gradient(135deg,#1a0000,#2d0000,#1a0000)',
        blue:'background:radial-gradient(ellipse at center,#0a1628,#020810)',
        circuit:'background:#0a0f0a;background-image:linear-gradient(rgba(0,200,0,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,0,.06) 1px,transparent 1px),radial-gradient(circle,rgba(0,200,0,.1) 1px,transparent 1px);background-size:6px 6px,6px 6px,12px 12px;background-position:0 0,0 0,3px 3px',
        fire:'background:linear-gradient(180deg,#1a0500,#331100,#1a0500,#330000)',
        ice:'background:linear-gradient(180deg,#001122,#003355,#001122)',
        neon:'background:#0d0d0d;background-image:linear-gradient(rgba(255,0,128,.05) 2px,transparent 2px),linear-gradient(90deg,rgba(0,255,255,.05) 2px,transparent 2px);background-size:6mm 6mm,6mm 6mm',
        dark:'background:linear-gradient(135deg,#0d1117,#161b22,#0d1117)',
        gold:'background:linear-gradient(160deg,#1a1a0a,#2a2010,#1a1a0a)'
    };
    return m[key] || m.cyber;
}

function frontLabels(fs){
    return '<div class="warn" style="font-size:'+fs+'px">'+
        'وێنەی مەگرە. بە کەس مەڵێ. بە دەنگی بەرز مەیخوێنەرەوە. بە پارێزراوی بیھێڵەرەوە.<br>'+
        'Do not photograph. Do not share. Do not read aloud. Keep safe.<br>'+
        'Nicht fotografieren. Nicht teilen. Nicht laut vorlesen. Sicher aufbewahren.</div>'+
        '<div class="write-line"></div>';
}

function makeBgHTML(bgKey){
    if(uploadedBg) return 'style="background:url('+uploadedBg+') center/cover;opacity:0.7"';
    return 'style="'+bgStyle(bgKey)+'"';
}

function qrHTML(size,pos){
    var align = pos === 'left' ? 'flex-start' : pos === 'right' ? 'flex-end' : 'center';
    var html = '<div class="qr-layer" style="justify-content:'+align+';gap:2mm;flex-wrap:wrap">';
    html += '<div class="qr-wrap" style="width:'+size+'mm;height:'+size+'mm"><img src="'+Q(Math.round(size*3.7))+'" style="width:100%;height:100%;display:block"></div>';
    // Custom QR
    if(customQrData || document.getElementById('customQrUrl').value.trim()){
        var src = customQrData || document.getElementById('customQrUrl').value.trim();
        html += '<div class="qr-wrap" style="width:'+size+'mm;height:'+size+'mm"><img src="'+src+'" style="width:100%;height:100%;display:block"></div>';
    }
    // Contact info
    var phone = document.getElementById('contactPhone').value.trim();
    var email = document.getElementById('contactEmail').value.trim();
    var ctext = document.getElementById('contactText').value.trim();
    if(phone || email || ctext){
        html += '<div style="position:absolute;bottom:1mm;left:1mm;right:1mm;z-index:3;font-size:3.8px;color:#fff8;text-align:center;line-height:1.4">';
        if(ctext) html += ctext + '<br>';
        if(phone) html += '📞 ' + phone + '<br>';
        if(email) html += '📧 ' + email;
        html += '</div>';
    }
    // Website URL
    if(document.getElementById('showUrl').checked){
        html += '<div style="position:absolute;top:1mm;left:1mm;right:1mm;z-index:3;font-size:3.2px;color:#fff6;text-align:center">'+getQRUrl()+'</div>';
    }
    html += '</div>';
    return html;
}

function build(){
    var pf = document.getElementById('pageFront'), pb = document.getElementById('pageBack');
    pf.innerHTML = ''; pb.innerHTML = '';
    var type = document.getElementById('splitType').value;
    var bg = document.getElementById('bgSelect').value;
    var fs = parseFloat(document.getElementById('fontSize').value);
    var pages = document.querySelectorAll('.page');
    var count = 0;

    pages.forEach(function(p){ p.style.gridTemplateColumns = '1fr 1fr'; p.style.gridTemplateRows = '1fr 1fr 1fr 1fr'; });

    if(type === '1'){
        count = 8;
        for(var i=0;i<count;i++){
            var fc = document.createElement('div'); fc.className = 'card';
            fc.innerHTML = '<div class="front"><div class="part">'+frontLabels(fs)+'</div></div>';
            pf.appendChild(fc);
            var bc = document.createElement('div'); bc.className='card'; bc.style.borderColor='#bbb';
            bc.innerHTML = '<div class="back"><div class="part">'+makeBgHTML(bg)+qrHTML(11,'center')+'</div></div>';
            pb.appendChild(bc);
        }
    } else if(type === '2v'){
        count = 8;
        for(var i=0;i<count;i++){
            var fc = document.createElement('div'); fc.className = 'card'; fc.style.flexDirection='row';
            fc.innerHTML = '<div class="front" style="border-right:1.5px dashed #000">'+frontLabels(fs)+'<div class="write-line"></div></div>'+
                '<div class="front">'+frontLabels(fs)+'<div class="write-line"></div></div>';
            pf.appendChild(fc);
            var bc = document.createElement('div'); bc.className='card'; bc.style.borderColor='#bbb'; bc.style.flexDirection='row';
            var sz = 9;
            bc.innerHTML = '<div class="back" style="border-right:1px dashed #fff8"><div class="part">'+makeBgHTML(bg)+qrHTML(sz,'center')+'</div></div>'+
                '<div class="back"><div class="part">'+makeBgHTML(bg)+qrHTML(sz,'center')+'</div></div>';
            pb.appendChild(bc);
        }
    } else {
        count = 8;
        for(var i=0;i<count;i++){
            var fc = document.createElement('div'); fc.className = 'card';
            fc.innerHTML = '<div class="front"><div class="part" style="border-bottom:1.5px dashed #000">'+frontLabels(fs)+'</div><div class="part">'+frontLabels(fs)+'</div></div>';
            pf.appendChild(fc);
            var bc = document.createElement('div'); bc.className='card'; bc.style.borderColor='#bbb';
            var sz = 9;
            bc.innerHTML = '<div class="back"><div class="part" style="border-bottom:1px dashed #fff8">'+makeBgHTML(bg)+qrHTML(sz,'center')+'</div><div class="part">'+makeBgHTML(bg)+qrHTML(sz,'center')+'</div></div>';
            pb.appendChild(bc);
        }
    }

    document.getElementById('frontTitle').textContent = '📝 Front — '+count+' per sheet';
    document.getElementById('backTitle').textContent = '🖼️ Back — '+count+' per sheet';
}
build();
</script>
</body>
</html>
