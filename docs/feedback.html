<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Feedback — Taybeti Notesharing</title>
    <style>
        :root{--bg:#0a0a0c;--surface:#141418;--surface2:#1e1e24;--text:#e0e0e0;--text-secondary:#a0a0b0;--accent:#4f9cf7;--border:#2a2a35;--radius:12px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:70px 16px 40px;display:flex;flex-direction:column;align-items:center}
        .container{max-width:600px;width:100%}
        h1{font-size:2rem;font-weight:800;margin-bottom:0.5rem;text-align:center;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        p{color:var(--text-secondary);text-align:center;margin-bottom:1.5rem;font-size:0.95rem}
        label{color:var(--text-secondary);font-size:0.9rem;display:block;margin-bottom:0.3rem}
        textarea,input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-family:inherit;font-size:0.95rem;margin-bottom:1rem}
        textarea:focus,input:focus{outline:none;border-color:var(--accent)}
        textarea{min-height:140px;resize:vertical}
        button{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:50px;font-weight:600;font-size:1rem;cursor:pointer;width:100%}
        button:hover{background:#3b82f6}
        .footer{text-align:center;margin-top:2rem;color:var(--text-secondary);font-size:0.85rem}
        .footer a{color:var(--accent);text-decoration:none}
        .note{text-align:center;font-size:0.8rem;color:var(--text-secondary);margin-bottom:1rem}
        .success{display:none;background:#0f2a0f;border:1px solid #00aa33;color:#88ff88;padding:1.2rem;border-radius:var(--radius);text-align:center;margin-bottom:1rem}
        .lang-bar{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
        .lang-bar button{background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);padding:3px 9px;border-radius:20px;cursor:pointer;font-size:0.76rem}
        .lang-bar button:hover,.lang-bar button.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .nav-bar{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;padding:2px 10px 4px}
        .nav-bar a{padding:3px 9px;border-radius:20px;text-decoration:none;font-size:0.76rem}
        .nav-bar a.active{background:var(--accent);border:1px solid var(--accent);color:#fff;font-weight:600}
        .nav-bar a.inactive{background:var(--surface);border:1px solid var(--border);color:var(--text-secondary)}
        @media(max-width:600px){h1{font-size:1.4rem}}
        @media print{.top-bar{display:none!important}body{padding-top:0!important}}
        input::placeholder,textarea::placeholder{color:#555}
    </style>
</head>

 </div>

<div class="container">
<h1 data-i18n="h1">💬 Send Feedback</h1>
<p data-i18n="sub">Anonymous. No account. No email required. Just your thoughts.</p>

<div class="success" id="successMsg" data-i18n="success">✅ Sent! Thank you for your feedback.</div>

<form id="feedbackForm" action="https://formspree.io/f/xwvzwody" method="POST">
    <input type="hidden" name="_subject" value="Taybeti Website Feedback">
    <input type="text" name="_gotcha" style="display:none">
    <label for="message" data-i18n="msg-label">Message:</label>
    <textarea id="message" name="message" required placeholder="Type your feedback here..."></textarea>
    <p class="note" data-i18n="note">Your email is not collected. This is completely anonymous.</p>
    <button type="submit" data-i18n="send">📨 Send Feedback</button>
</form>

<div class="footer"><p>© 2026 Taybeti Notesharing — <a href="index.html">Home</a></p></div>
</div>

<script>
document.getElementById('feedbackForm').addEventListener('submit', function(e){
    e.preventDefault();
    var form = this;
    var data = new FormData(form);
    fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } })
    .then(function(r){ return r.json(); })
    .then(function(r){
        if(r.ok){
            document.getElementById('successMsg').style.display = 'block';
            form.style.display = 'none';
        } else {
            alert('Failed to send. Try again later.');
        }
    })
    .catch(function(){ alert('Network error. Try again.'); });
});

function setLang(l){
 document.querySelectorAll('.lang-bar button').forEach(function(b){b.classList.remove('active')});
 var btn=document.getElementById('btn-'+l);if(btn)btn.classList.add('active');
 document.querySelectorAll('[data-i18n]').forEach(function(el){
